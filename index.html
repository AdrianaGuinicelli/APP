<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventConnect – Condividi Esperienze</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;overflow-y:auto;min-height:100vh;}

/* SPLASH */
.splash{position:fixed;inset:0;background:linear-gradient(160deg,#6c5ce7 0%,#a29bfe 100%);z-index:999;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 24px 44px;text-align:center;}
.splash-logo{font-size:72px;line-height:1;}
.splash-title{font-size:36px;font-weight:800;letter-spacing:-.5px;margin-top:14px;}
.splash-sub{font-size:16px;opacity:.88;line-height:1.5;margin-top:10px;}
.splash-pills{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.splash-pill{background:rgba(255,255,255,.22);border-radius:20px;padding:8px 16px;font-size:13px;}
.splash-btns{width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;}
.splash-btn-primary{width:100%;padding:16px;border-radius:16px;border:none;background:#fff;color:#6c5ce7;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.18);}
.splash-btn-secondary{width:100%;padding:16px;border-radius:16px;border:2px solid rgba(255,255,255,.75);background:transparent;color:#fff;font-size:17px;font-weight:700;cursor:pointer;}
.splash-btn-ghost{width:100%;padding:12px;border-radius:16px;border:none;background:rgba(255,255,255,.18);color:#fff;font-size:14px;cursor:pointer;}
.splash-footer{margin-top:8px;font-size:12px;opacity:.55;}

/* APP SHELL */
.app{display:none;min-height:100vh;flex-direction:column;}

/* HEADER */
.header{padding:0 20px;background:#fff;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100;height:56px;}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{font-size:26px;cursor:pointer;color:#6c5ce7;display:none;line-height:1;}
.header-title{font-weight:700;font-size:17px;}
.header-logo{font-size:17px;font-weight:800;background:linear-gradient(90deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-right{display:flex;align-items:center;gap:4px;}
.hdr-icon-btn{position:relative;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:background .2s;border:none;background:transparent;}
.hdr-icon-btn:hover{background:#f0eeff;}
.hdr-badge{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#ff4757;border:2px solid #fff;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;}
.profile-dropdown-wrap{position:relative;}
.profile-avatar-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#a29bfe);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;cursor:pointer;border:none;flex-shrink:0;transition:opacity .2s;overflow:hidden;}
.profile-avatar-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.profile-avatar-btn:hover{opacity:.85;}
.profile-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);min-width:210px;padding:8px 0;display:none;z-index:500;border:1px solid #eee;}
.profile-dropdown.open{display:block;}
.pd-item{display:flex;align-items:center;gap:10px;padding:12px 18px;font-size:14px;font-weight:500;color:#333;cursor:pointer;transition:background .15s;}
.pd-item:hover{background:#f5f5f7;}
.pd-icon{font-size:17px;width:22px;text-align:center;}
.pd-badge{margin-left:auto;background:#6c5ce7;color:#fff;border-radius:50px;padding:2px 8px;font-size:11px;font-weight:800;}
.pd-divider{height:1px;background:#eee;margin:4px 0;}
.pd-item.logout{color:#ff4757;}

/* CONTENT */
.app-body{display:flex;flex:1;}
.content{flex:1;padding:20px;overflow-y:auto;max-width:100%;padding-bottom:90px;}

/* BOTTOM NAVBAR */
.navbar{display:flex;justify-content:space-around;align-items:center;padding:6px 0 10px;border-top:1px solid #eee;background:#fff;position:fixed;bottom:0;left:0;right:0;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
.nav-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;color:#aaa;gap:0;transition:color .2s;min-width:52px;padding:4px 0;position:relative;}
.nav-item.active{color:#6c5ce7;}
.nav-icon-wrap{position:relative;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.nav-icon{font-size:24px;line-height:1;}
.nav-dot{position:absolute;top:-2px;right:-4px;width:8px;height:8px;border-radius:50%;background:#ff4757;border:2px solid #fff;}
.nav-plus-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;margin-top:-18px;}
.nav-plus{background:linear-gradient(135deg,#6c5ce7,#8e7dff);color:#fff;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 16px rgba(108,92,231,.5);transition:transform .2s;}
.nav-plus:active{transform:scale(.93);}

/* UI COMPONENTS */
.btn{background:linear-gradient(90deg,#6c5ce7,#8e7dff);color:#fff;padding:13px;text-align:center;border-radius:14px;margin-top:10px;cursor:pointer;font-weight:700;font-size:15px;border:none;width:100%;display:block;transition:opacity .2s;}
.btn:active{opacity:.8;}
.btn.secondary{background:#f0f0f5;color:#6c5ce7;}
.btn.outline{background:transparent;color:#6c5ce7;border:1.5px solid #6c5ce7;}
.btn.danger{background:linear-gradient(90deg,#ff4757,#ff6b81);}
.btn.green{background:linear-gradient(90deg,#00b894,#55efc4);}
.btn.sm{padding:8px 14px;font-size:13px;border-radius:10px;width:auto;display:inline-block;margin-top:0;}
.card{background:#fff;border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.card-title{font-weight:700;font-size:16px;margin-bottom:4px;}
.card-meta{font-size:13px;color:#666;display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.card-tag{display:inline-block;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:6px;margin-right:4px;}
.tag-musica{background:#f0eeff;color:#6c5ce7;}
.tag-arte{background:#fce4ec;color:#c2185b;}
.tag-sport{background:#e8f8f5;color:#00897b;}
.tag-trekking{background:#e8f5e9;color:#388e3c;}
.tag-food{background:#fff3e0;color:#e65100;}
.tag-cinema{background:#e3f2fd;color:#1565c0;}
.tag-teatro{background:#f3e5f5;color:#7b1fa2;}
.tag-viaggi{background:#e0f7fa;color:#00838f;}
.tag-tecnologia{background:#e8eaf6;color:#3949ab;}
.tag-altro{background:#f5f5f5;color:#555;}
.tag-libri{background:#fff8e1;color:#f57f17;}
.tag-benessere{background:#f1f8e9;color:#558b2f;}
.tag-cibo{background:#fff3e0;color:#e65100;}
input,textarea,select{width:100%;padding:12px 14px;margin-top:8px;border-radius:12px;border:1.5px solid #e0e0e0;font-size:14px;outline:none;transition:border-color .2s;background:#fafafa;font-family:inherit;color:#222;}
input:focus,textarea:focus,select:focus{border-color:#6c5ce7;background:#fff;}
label{font-size:13px;color:#555;font-weight:600;margin-top:14px;display:block;}
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #6c5ce7;border-radius:12px;z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(108,92,231,.15);}
.autocomplete-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover{background:#f0eeff;color:#6c5ce7;}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#a29bfe);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar.lg{width:80px;height:80px;font-size:30px;}
.avatar.sm{width:32px;height:32px;font-size:13px;}
.avatar.xl{width:110px;height:110px;font-size:36px;}
.badge{background:#6c5ce7;color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;}
.badge.green{background:#00b894;}
.badge.red{background:#ff4757;}
.badge.orange{background:#e67e22;}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.chip{padding:9px 16px;border-radius:20px;border:2px solid #e0e0e0;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;transition:all .2s;background:#fff;}
.chip.selected{border-color:#6c5ce7;background:#f0eeff;color:#6c5ce7;font-weight:700;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:8px;}
.section-title{font-weight:700;font-size:17px;}
.section-link{color:#6c5ce7;font-size:13px;cursor:pointer;}
.search-bar{display:flex;align-items:center;gap:10px;background:#f5f5f7;border-radius:14px;padding:10px 14px;margin-bottom:12px;border:1.5px solid #e8e8e8;}
.search-bar input{border:none;background:transparent;padding:0;margin:0;font-size:14px;flex:1;}
.search-bar input:focus{border:none;background:transparent;}
.filters{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;}
.filters::-webkit-scrollbar{display:none;}
.filter-chip{padding:7px 14px;border-radius:20px;border:1.5px solid #e0e0e0;cursor:pointer;font-size:13px;white-space:nowrap;background:#fff;transition:all .2s;flex-shrink:0;}
.filter-chip.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7;}
.scroll-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
.scroll-row::-webkit-scrollbar{display:none;}
.scroll-card{min-width:190px;background:#fff;border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);flex-shrink:0;cursor:pointer;transition:transform .15s;}
.scroll-card:active{transform:scale(.97);}
.chat-messages{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:400px;overflow-y:auto;}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.me{align-items:flex-end;}
.msg-wrap.them{align-items:flex-start;}
.msg-bubble{max-width:76%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;}
.msg-bubble.received{background:#f0f0f5;border-bottom-left-radius:4px;}
.msg-bubble.sent{background:linear-gradient(90deg,#6c5ce7,#8e7dff);color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:#aaa;margin-top:2px;}
.msg-sender{font-size:11px;color:#6c5ce7;font-weight:700;margin-bottom:2px;}
.chat-input-row{display:flex;gap:8px;align-items:center;margin-top:4px;}
.chat-input-row input{margin:0;flex:1;}
.send-btn{background:linear-gradient(135deg,#6c5ce7,#8e7dff);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tabs{display:flex;border-bottom:2px solid #eee;margin-bottom:14px;}
.tab{flex:1;text-align:center;padding:10px;cursor:pointer;font-size:14px;font-weight:700;color:#aaa;}
.tab.active{color:#6c5ce7;border-bottom:2px solid #6c5ce7;margin-bottom:-2px;}
.profile-stats{display:flex;border-top:1px solid #eee;border-bottom:1px solid #eee;margin:14px 0;}
.profile-stat{flex:1;text-align:center;padding:14px 0;}
.profile-stat .num{font-size:20px;font-weight:800;color:#222;}
.profile-stat .lbl{font-size:12px;color:#888;}
.match-row{display:flex;align-items:center;gap:12px;padding:13px;background:#fafafa;border-radius:14px;margin-bottom:10px;}
.compat-bar{height:6px;border-radius:3px;background:#eee;margin-top:4px;flex:1;}
.compat-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#6c5ce7,#00b894);}
.match-pct{font-weight:800;color:#6c5ce7;font-size:16px;margin-left:auto;}
.stars{display:flex;gap:8px;font-size:36px;justify-content:center;margin:16px 0;}
.star{cursor:pointer;color:#ddd;transition:color .2s;}
.star.active{color:#f39c12;}
.notif-item{display:flex;gap:12px;align-items:flex-start;padding:13px;background:#fff;border-radius:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.notif-dot{width:10px;height:10px;border-radius:50%;background:#6c5ce7;margin-top:5px;flex-shrink:0;}
.notif-dot.read{background:#ddd;}
.report-option{padding:13px;border-radius:12px;border:1.5px solid #eee;margin-bottom:8px;cursor:pointer;font-size:14px;transition:all .2s;}
.report-option.selected{border-color:#ff4757;background:#fff5f5;color:#ff4757;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:0 1px 8px rgba(0,0,0,.07);}
.stat-num{font-size:22px;font-weight:800;color:#6c5ce7;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}
.ai-bubble{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;border-radius:20px 20px 20px 4px;padding:14px 16px;font-size:14px;line-height:1.55;margin-bottom:12px;}
.ai-suggestion{background:#f8f7ff;border-radius:14px;padding:13px;margin-bottom:10px;border:1.5px solid #e8e4ff;cursor:pointer;transition:background .2s;}
.ai-suggestion:hover{background:#f0eeff;}
.ai-dot{width:8px;height:8px;border-radius:50%;background:#6c5ce7;animation:bounce .9s infinite;display:inline-block;margin:0 2px;}
.ai-dot:nth-child(2){animation-delay:.15s;}
.ai-dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.detail-hero{width:100%;height:180px;border-radius:16px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);display:flex;align-items:center;justify-content:center;color:#fff;font-size:60px;margin-bottom:14px;overflow:hidden;position:relative;}
.detail-hero img{width:100%;height:100%;object-fit:cover;}
.detail-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:14px;}
.detail-row .icon{font-size:18px;width:24px;flex-shrink:0;margin-top:1px;}
.progress-bar{height:6px;background:#eee;border-radius:3px;margin-top:6px;}
.progress-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#6c5ce7,#00b894);transition:width .4s;}
.verified-badge{display:inline-flex;align-items:center;gap:4px;background:#e8f8f5;color:#00897b;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(50,50,50,.92);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;white-space:nowrap;pointer-events:none;animation:fadeInOut 2.8s forwards;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:#888;}
.spinner{width:36px;height:36px;border:3px solid #f0eeff;border-top:3px solid #6c5ce7;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none!important;}
.events-grid{display:grid;grid-template-columns:1fr;gap:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* Password strength */
.pwd-strength{margin-top:6px;font-size:12px;display:flex;flex-direction:column;gap:4px;}
.pwd-rule{display:flex;align-items:center;gap:6px;color:#aaa;}
.pwd-rule.ok{color:#00b894;}
.pwd-rule.fail{color:#ff4757;}

/* Profile hero / cover */
.profile-cover{width:100%;height:140px;border-radius:18px 18px 0 0;background:linear-gradient(135deg,#6c5ce7,#a29bfe);overflow:hidden;position:relative;cursor:pointer;}
.profile-cover img{width:100%;height:100%;object-fit:cover;}
.profile-cover-edit{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.45);color:#fff;border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px;}
.profile-avatar-wrap{position:relative;display:inline-block;margin-top:-44px;margin-left:16px;}
.profile-avatar-wrap .avatar.xl{border:4px solid #fff;}
.profile-avatar-edit{position:absolute;bottom:2px;right:2px;background:#6c5ce7;color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:2px solid #fff;}

/* Distance filter */
.distance-section{background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);}

/* Gender chips */
.gender-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.gender-chip{padding:8px 18px;border-radius:20px;border:2px solid #e0e0e0;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;transition:all .2s;background:#fff;font-weight:600;}
.gender-chip.selected{border-color:#6c5ce7;background:#f0eeff;color:#6c5ce7;}

/* Settings */
.settings-section{background:#fff;border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.settings-section h3{font-size:16px;font-weight:700;color:#6c5ce7;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.slots-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.slot-box{width:52px;height:52px;border-radius:14px;border:2px dashed #d0d0e0;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:#fafafa;position:relative;transition:all .2s;}
.slot-box.filled{border-style:solid;border-color:#6c5ce7;background:#f0eeff;}
.slot-box .slot-remove{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#ff4757;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.btn-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.btn-pool-item{padding:8px 14px;border-radius:20px;border:2px solid #e0e0e0;background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-pool-item:hover{border-color:#6c5ce7;color:#6c5ce7;}
.btn-pool-item.in-use{opacity:.4;pointer-events:none;}
.premium-card{background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:18px;padding:24px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.premium-card::before{content:'⭐';position:absolute;right:-10px;top:-10px;font-size:120px;opacity:.08;}
.premium-badge{background:rgba(255,255,255,.25);border-radius:50px;padding:4px 12px;font-size:12px;font-weight:700;display:inline-block;margin-bottom:10px;}
.premium-features{list-style:none;margin:12px 0;display:flex;flex-direction:column;gap:8px;}
.premium-features li{font-size:14px;opacity:.95;display:flex;align-items:center;gap:8px;}
.btn-premium{background:#fff;color:#6c5ce7;border:none;border-radius:14px;padding:13px;width:100%;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.btn-premium:hover{opacity:.9;}
.btn-premium.active-plan{background:rgba(255,255,255,.3);color:#fff;cursor:default;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:14px;font-weight:600;}
.toggle-sub{font-size:12px;color:#888;margin-top:2px;}
.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ddd;transition:.3s;border-radius:24px;}
.slider:before{position:absolute;content:'';height:18px;width:18px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);}
input:checked+.slider{background:#6c5ce7;}
input:checked+.slider:before{transform:translateX(20px);}

/* Email verify banner */
.verify-banner{background:#fff3cd;border:1.5px solid #ffc107;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:#856404;}

@media(min-width:768px){
  .content{padding:28px 32px 100px;}

/* ── PASSWORD VALIDATION ── */
function validatePassword(pwd){
  return{
    length: pwd.length>=8,
    upper: /[A-Z]/.test(pwd),
    number: /[0-9]/.test(pwd),
    special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pwd)
  };
}
function isPasswordValid(pwd){const v=validatePassword(pwd);return v.length&&v.upper&&v.number&&v.special;}
function renderPwdStrength(pwd){
  const v=validatePassword(pwd);
  return`<div class="pwd-strength">
    <div class="pwd-rule ${v.length?'ok':'fail'}">${v.length?'✅':'❌'} Almeno 8 caratteri</div>
    <div class="pwd-rule ${v.upper?'ok':'fail'}">${v.upper?'✅':'❌'} Almeno una lettera maiuscola</div>
    <div class="pwd-rule ${v.number?'ok':'fail'}">${v.number?'✅':'❌'} Almeno un numero</div>
    <div class="pwd-rule ${v.special?'ok':'fail'}">${v.special?'✅':'❌'} Almeno un carattere speciale (!@#$...)</div>

}

/* ── GEO ── */
function haversine(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))).toFixed(1);}
function distLabel(ev){if(!userLocation||!ev.latitude)return null;const k=parseFloat(haversine(userLocation.lat,userLocation.lng,ev.latitude,ev.longitude));return k<1?'< 1 km':k+' km';}
async function requestGeo(){return new Promise(r=>{if(!navigator.geolocation)return r(null);navigator.geolocation.getCurrentPosition(p=>{userLocation={lat:p.coords.latitude,lng:p.coords.longitude};r(userLocation);},()=>r(null),{timeout:6000});});}

/* ── NOMINATIM ── */
let geoT=null;
function setupGeoAutocomplete(iId,lId,cb){
  const inp=document.getElementById(iId),lst=document.getElementById(lId);
  if(!inp||!lst)return;
  inp.addEventListener('input',()=>{
    clearTimeout(geoT);const q=inp.value.trim();if(q.length<3){lst.style.display='none';return;}
    geoT=setTimeout(async()=>{
      try{
        const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=5&accept-language=it');
        const data=await r.json();if(!data.length){lst.style.display='none';return;}
        lst.innerHTML='';lst.style.display='block';
        data.forEach(item=>{const d=document.createElement('div');d.className='autocomplete-item';d.textContent=item.display_name;d.onclick=()=>{inp.value=item.display_name;lst.style.display='none';if(cb)cb(item);};lst.appendChild(d);});
      }catch(e){lst.style.display='none';}
    },400);
  });
  document.addEventListener('click',e=>{if(!inp.contains(e.target))lst.style.display='none';});
}

async function doLogin(){

  if(!isValidEmail(email)){toast('⚠️ Email non valida');return;}
  toast('⏳ Accesso in corso...');
  const {data,error}=await supabase.auth.signInWithPassword({email,password:pwd});

  if(!data.user.email_confirmed_at){
    pendingEmailVerify=true;

}

async function doRegister(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pwd=document.getElementById('regPwd').value;
  const pwd2=document.getElementById('regPwd2').value;
  const city=document.getElementById('regCity').value.trim();
  const birth=document.getElementById('regBirth').value;
  if(!name||!email||!pwd||!city||!birth){toast('⚠️ Compila tutti i campi obbligatori');return;}
  if(!isValidEmail(email)){toast('⚠️ Inserisci un\'email valida');return;}
  if(!isPasswordValid(pwd)){toast('⚠️ La password non soddisfa i requisiti di sicurezza');return;}
  if(pwd!==pwd2){toast('⚠️ Le password non corrispondono');return;}
  if(!selectedGender){toast('⚠️ Seleziona il tuo genere');return;}
  toast('⏳ Registrazione...');
  const {data,error}=await supabase.auth.signUp({
    email,password:pwd,
    options:{emailRedirectTo:window.location.href}
  });
  if(error){toast('❌ '+error.message);return;}
  await supabase.from('profiles').insert({
    id:data.user.id,name,city,
    birth_date:birth,

    secondary_cities:[]
  });

  showModal('📧 Verifica Email',`

async function finishOnboarding(){

    await supabase.from('user_interests').delete().eq('user_id',currentUser.id);

    if(iRows?.length)await supabase.from('user_interests').insert(iRows.map(i=>({user_id:currentUser.id,interest_id:i.id})));
    await supabase.from('profiles').update({completeness:60}).eq('id',currentUser.id);
    currentUser.interests=userInterests;
  }

}

function setCatFilter(cat,el){activeFilters.category=cat;document.querySelectorAll('#catFilters .filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');filterEvents();}
function setGenderFilter(g,el){activeFilters.gender=g;document.querySelectorAll('#genderFilters .filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');filterEvents();}
function setOrgGenderFilter(g,el){activeFilters.organizerGender=g;document.querySelectorAll('#orgGenderFilters .filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');filterEvents();}
function onDistSlider(val){activeFilters.maxDistance=parseInt(val);const el=document.getElementById('distVal');if(el)el.textContent=val>=200?'Tutte':val+' km';filterEvents();}
function enableGeo(){navigator.geolocation.getCurrentPosition(p=>{userLocation={lat:p.coords.latitude,lng:p.coords.longitude};drawSearch();},()=>toast('❌ Posizione non disponibile'));}

function filterEvents(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const city=(document.getElementById('citySearchInput')?.value||'').toLowerCase();
  const sort=document.getElementById('sortSel')?.value||'default';
  let filtered=events.filter(e=>{
    const mQ=!q||e.title.toLowerCase().includes(q)||(e.category||'').toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q);
    const mC=!city||(e.location||'').toLowerCase().includes(city);
    const mCat=!activeFilters.category||e.category===activeFilters.category;
    let mD=true;
    if(userLocation&&e.latitude&&activeFilters.maxDistance<200)mD=parseFloat(haversine(userLocation.lat,userLocation.lng,e.latitude,e.longitude))<=activeFilters.maxDistance;
    // Filtro genere evento
    let mG=true;
    if(activeFilters.gender&&e.gender_preference){mG=e.gender_preference===''||e.gender_preference===activeFilters.gender||e.gender_preference==='mf';}
    // Filtro genere organizzatore
    let mOG=true;
    if(activeFilters.organizerGender&&e.organizer_gender){mOG=e.organizer_gender===activeFilters.organizerGender;}
    return mQ&&mC&&mCat&&mD&&mG&&mOG;
  });
  if(sort==='distance'&&userLocation)filtered.sort((a,b)=>parseFloat(haversine(userLocation.lat,userLocation.lng,a.latitude,a.longitude))-parseFloat(haversine(userLocation.lat,userLocation.lng,b.latitude,b.longitude)));
  else if(sort==='price')filtered.sort((a,b)=>a.price-b.price);
  let html='';
  if(!filtered.length)html='<div style="text-align:center;color:#aaa;padding:40px;grid-column:1/-1">Nessun evento trovato</div>';
  filtered.forEach(e=>{
    const dl=distLabel(e);
    const gpLabel={'m':'👨 Solo uomini','f':'👩 Solo donne','mf':'👫 Misto','':''}[e.gender_preference||'']||'';
    html+='<div class="card" style="cursor:pointer" onclick="navigate(\'eventDetail\','+e.id+')"><div style="display:flex;gap:12px;align-items:flex-start"><div style="font-size:40px">'+(e.emoji||'🎉')+'</div><div style="flex:1"><span class="card-tag tag-'+(e.category||'altro').toLowerCase()+'">'+(e.category||'Altro')+'</span>'+(gpLabel?'<span class="card-tag" style="background:#e8f4fd;color:#1565c0">'+gpLabel+'</span>':'')+'<div class="card-title">'+e.title+'</div><div class="card-meta">📍 '+(e.location||'')+(dl?' <span style="background:#f0eeff;color:#6c5ce7;border-radius:8px;padding:1px 6px;font-size:11px;font-weight:700">📍 '+dl+'</span>':'')+'</div>'+(e.price===0?'<div class="card-meta" style="color:#00b894">✅ Gratuito</div>':'<div class="card-meta" style="color:#e67e22">💰 €'+e.price+'</div>')+'</div></div></div>';
  });
  document.getElementById('searchResults').innerHTML=html;
}

    const full=(pCount||0)>=e.max_participants;

    html+='<div class="btn secondary" onclick="toggleSave('+e.id+')" style="margin-top:8px">🔖 '+(isSaved?'Salvato ✓':'Mi interessa')+'</div>';
  }
  html+='<div style="margin-top:16px;text-align:center"><span style="color:#ff4757;font-size:13px;cursor:pointer" onclick="navigate(\'report\','+e.id+')">🚩 Segnala evento</span></div></div>';
  document.getElementById('content').innerHTML=html;
}
async function joinEvent(id){
  if(!isLoggedIn){toast('⚠️ Devi essere loggato');navigate('login');return;}
  const {error}=await supabase.from('event_participants').insert({event_id:id,user_id:currentUser.id});
  if(error){toast('❌ '+error.message);return;}
  toast('✅ Hai aderito!');
  notifications.unshift({id:Date.now(),text:'Hai aderito a un evento!',time:'ora',read:false,icon:'✅'});
  drawEventDetail(id);
}
async function leaveEvent(id){
  const {error}=await supabase.from('event_participants').delete().eq('event_id',id).eq('user_id',currentUser.id);
  if(error){toast('❌ '+error.message);return;}
  toast('👋 Hai abbandonato l\'evento');navigate('home');
}
function shareEvent(id){
  const e=events.find(ev=>ev.id===id);
  if(navigator.share)navigator.share({title:e?.title||'EventConnect',text:'Vieni a questo evento!',url:window.location.href});
  else{navigator.clipboard?.writeText(window.location.href);toast('🔗 Link copiato!');}
}

  let html='<div style="max-width:700px;margin:0 auto;">';

function addSecCity(){
  const list=document.getElementById('secondaryCitiesList');
  if(!list)return;
  const count=list.querySelectorAll('input').length;
  if(count>=2){toast('⚠️ Massimo 2 città secondarie');return;}
  const idx=count;
  const div=document.createElement('div');
  div.style.cssText='display:flex;align-items:center;gap:8px;margin-top:8px';
  div.innerHTML=`<input value="" id="secCity_${idx}" style="flex:1;margin-top:0" placeholder="Città secondaria">
    <div class="btn sm danger" style="flex-shrink:0" onclick="this.parentElement.remove();checkAddSecBtn()">✕</div>`;
  list.appendChild(div);
  if(list.querySelectorAll('input').length>=2){
    const addBtn=document.querySelector('[onclick="addSecCity()"]');
    if(addBtn)addBtn.style.display='none';
  }
}
function removeSecCity(i){
  const inp=document.getElementById('secCity_'+i);
  if(inp)inp.closest('div').remove();
  const addBtn=document.querySelector('[onclick="addSecCity()"]');
  if(addBtn)addBtn.style.display='';
}

function triggerPhotoUpload(){document.getElementById('photoFileInput').click();}
function triggerCoverUpload(){document.getElementById('coverFileInput').click();}

async function uploadPhoto(input){
  const file=input.files[0];if(!file)return;
  toast('⏳ Caricamento foto...');
  const ext=file.name.split('.').pop();
  const path=`avatars/${currentUser.id}.${ext}`;
  const {error:upErr}=await supabase.storage.from('avatars').upload(path,file,{upsert:true});
  if(upErr){toast('❌ '+upErr.message);return;}
  const {data:urlData}=supabase.storage.from('avatars').getPublicUrl(path);
  const url=urlData.publicUrl+'?t='+Date.now();
  await supabase.from('profiles').update({photo_url:url}).eq('id',currentUser.id);
  currentUser.photo_url=url;
  toast('✅ Foto profilo aggiornata!');
  renderHeaderRight();
  drawProfile();

async function uploadCover(input){

  const ext=file.name.split('.').pop();
  const path=`covers/${currentUser.id}.${ext}`;
  const {error:upErr}=await supabase.storage.from('avatars').upload(path,file,{upsert:true});
  if(upErr){toast('❌ '+upErr.message);return;}
  const {data:urlData}=supabase.storage.from('avatars').getPublicUrl(path);
  const url=urlData.publicUrl+'?t='+Date.now();
  await supabase.from('profiles').update({cover_url:url}).eq('id',currentUser.id);
  currentUser.cover_url=url;
  toast('✅ Foto di copertina aggiornata!');

async function saveProfile(){
  const bio=document.getElementById('editBio')?.value||'';

  const maxDist=parseInt(document.getElementById('editDistSlider')?.value)||50;

  const {error}=await supabase.from('profiles').update({
    bio,city,
    completeness:Math.min(100,(currentUser.completeness||40)+15),
    max_distance:maxDist,
    secondary_cities:secondaryCities
  }).eq('id',currentUser.id);
  if(error){toast('❌ '+error.message);return;}
  await supabase.from('user_interests').delete().eq('user_id',currentUser.id);

/* ── MATCH PERSONE ── */
async function drawMatchPeople(){
  showLoading();
  const {data:profiles}=await supabase.from('profiles').select('*').neq('id',currentUser?.id||'');
  const results=[];
  for(const u of(profiles||[]).slice(0,10)){
    if(blockedUsers.includes(u.id))continue;
    const {data:ui}=await supabase.from('user_interests').select('interests(name)').eq('user_id',u.id);
    const uI=(ui||[]).map(x=>x.interests?.name).filter(Boolean);
    const common=userInterests.filter(i=>uI.includes(i));
    const total=new Set([...userInterests,...uI]).size;
    const pct=Math.min(95,Math.round((common.length/Math.max(total,1))*100+35));
    results.push({...u,commonInterests:common,pct});
  }
  results.sort((a,b)=>b.pct-a.pct);
  let html='<div style="font-size:14px;color:#888;margin-bottom:16px">Basato sui tuoi interessi in comune</div>';
  if(!results.length)html+='<div style="text-align:center;color:#aaa;padding:40px">Nessun utente trovato ancora</div>';
  results.forEach(u=>{
    const avatarContent=u.photo_url?`<img src="${u.photo_url}" />`:(u.emoji||'👤');
    html+=`<div class="match-row">
      <div class="avatar">${avatarContent}</div>
      <div style="flex:1">
        <div style="font-weight:700">${u.name}${u.verified?' ✅':''}</div>
        <div style="font-size:12px;color:#888">📍 ${u.city||''}</div>
        <div style="font-size:12px;color:#6c5ce7;margin:2px 0">${u.commonInterests.length} interessi in comune: ${u.commonInterests.join(', ')||'nessuno'}</div>
        <div class="compat-bar"><div class="compat-fill" style="width:${u.pct}%"></div></div>
      </div>
      <div class="match-pct">${u.pct}%</div>
    </div>`;
  });
  document.getElementById('content').innerHTML=html;
}

    let h='<div class="events-grid">';(data||[]).forEach(u=>{
      const av=u.photo_url?`<img src="${u.photo_url}" style="width:42px;height:42px;border-radius:50%;object-fit:cover;">`:(u.emoji||'👤');
      h+='<div class="card"><div style="display:flex;align-items:center;gap:12px"><div class="avatar">'+av+'</div><div style="flex:1"><div style="font-weight:700">'+(u.name||'Utente')+(u.verified?' ✅':'')+'</div><div style="font-size:12px;color:#888">📍 '+(u.city||'')+'</div></div><div class="btn sm danger" onclick="toast(\'Presto disponibile\')">🚫</div></div></div>';
    });h+='</div>';c.innerHTML=h;
  } else if(tab==='events'){
    const {data}=await supabase.from('events').select('*').order('created_at',{ascending:false}).limit(20);
    let h='<div class="events-grid">';(data||[]).forEach(e=>{h+='<div class="card"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:28px">'+(e.emoji||'🎉')+'</span><div style="flex:1"><div style="font-weight:700">'+e.title+'</div><div style="font-size:12px;color:#888">'+(e.location||'')+' • <span class="badge '+(e.status==='active'?'green':'red')+'">'+e.status+'</span></div></div><div class="btn sm danger" onclick="adminRemoveEvent('+e.id+')">🗑️</div></div></div>';});h+='</div>';c.innerHTML=h;
  }
}
async function adminResolve(id,status){await supabase.from('reports').update({status}).eq('id',id);toast(status==='resolved'?'✅ Risolto':'🗑️ Ignorato');drawAdmin();}
async function adminRemoveEvent(id){await supabase.from('events').update({status:'removed'}).eq('id',id);toast('🗑️ Evento rimosso');await loadEvents();drawAdmin();}
</script>
</body>
</html>
