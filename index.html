<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EventConnect – Condividi Esperienze</title>
<style>
/* ============================================================
   RESET & BASE
============================================================ */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;overflow:hidden;}

/* ============================================================
   APP SHELL
============================================================ */
.app{
  max-width:430px;margin:0 auto;
  background:#f5f5f7;
  height:100vh;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,.15);
}

/* HEADER */
.header{
  padding:14px 16px;
  background:#fff;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #eee;
  position:relative;z-index:50;
  min-height:54px;
}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{
  font-size:26px;cursor:pointer;color:#6c5ce7;
  display:none;line-height:1;
}
.header-title{font-weight:700;font-size:17px;}
.header-logo{
  font-size:17px;font-weight:800;
  background:linear-gradient(90deg,#6c5ce7,#a29bfe);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-right{display:flex;align-items:center;gap:12px;}
.header-icon{font-size:22px;cursor:pointer;position:relative;}
.badge-dot{
  position:absolute;top:-2px;right:-2px;
  width:9px;height:9px;border-radius:50%;
  background:#ff4757;border:2px solid #fff;
}

/* CONTENT */
.content{
  flex:1;overflow-y:auto;padding:16px;
  padding-bottom:85px;
  -webkit-overflow-scrolling:touch;
}
.content::-webkit-scrollbar{display:none;}

/* NAVBAR */
.navbar{
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 0 14px;
  border-top:1px solid #eee;background:#fff;
  position:absolute;bottom:0;left:0;right:0;z-index:50;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;font-size:10px;color:#aaa;gap:2px;
  transition:color .2s;min-width:52px;
}
.nav-item.active{color:#6c5ce7;}
.nav-icon{font-size:22px;line-height:1;}
.nav-plus{
  background:linear-gradient(135deg,#6c5ce7,#8e7dff);
  color:#fff;border-radius:50%;
  width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin-top:-14px;
  box-shadow:0 4px 14px rgba(108,92,231,.5);
}

/* ============================================================
   BUTTONS
============================================================ */
.btn{
  background:linear-gradient(90deg,#6c5ce7,#8e7dff);
  color:#fff;padding:13px;text-align:center;
  border-radius:14px;margin-top:10px;cursor:pointer;
  font-weight:700;font-size:15px;border:none;width:100%;
  display:block;transition:opacity .2s;
}
.btn:active{opacity:.8;}
.btn.secondary{background:#f0f0f5;color:#6c5ce7;}
.btn.outline{background:transparent;color:#6c5ce7;border:1.5px solid #6c5ce7;}
.btn.danger{background:linear-gradient(90deg,#ff4757,#ff6b81);}
.btn.sm{
  padding:8px 14px;font-size:13px;border-radius:10px;
  width:auto;display:inline-block;margin-top:0;
}
.btn.green{background:linear-gradient(90deg,#00b894,#55efc4);}

/* ============================================================
   CARDS
============================================================ */
.card{
  background:#fff;border-radius:18px;padding:14px;
  margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);
}
.card-title{font-weight:700;font-size:16px;margin-bottom:4px;}
.card-meta{font-size:13px;color:#666;display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.card-tag{
  display:inline-block;border-radius:20px;
  padding:3px 10px;font-size:12px;font-weight:700;
  margin-bottom:6px;margin-right:4px;
}
.tag-musica{background:#f0eeff;color:#6c5ce7;}
.tag-arte{background:#fce4ec;color:#c2185b;}
.tag-sport{background:#e8f8f5;color:#00897b;}
.tag-trekking{background:#e8f5e9;color:#388e3c;}
.tag-food{background:#fff3e0;color:#e65100;}
.tag-cinema{background:#e3f2fd;color:#1565c0;}
.tag-teatro{background:#f3e5f5;color:#7b1fa2;}
.tag-viaggi{background:#e0f7fa;color:#00838f;}
.tag-tech{background:#e8eaf6;color:#3949ab;}
.tag-altro{background:#f5f5f5;color:#555;}

/* ============================================================
   INPUTS & FORMS
============================================================ */
input,textarea,select{
  width:100%;padding:12px 14px;margin-top:8px;
  border-radius:12px;border:1.5px solid #e0e0e0;
  font-size:14px;outline:none;transition:border-color .2s;
  background:#fafafa;font-family:inherit;color:#222;
}
input:focus,textarea:focus,select:focus{border-color:#6c5ce7;background:#fff;}
label{font-size:13px;color:#555;font-weight:600;margin-top:14px;display:block;}
.form-group{margin-bottom:4px;}

/* AUTOCOMPLETE */
.autocomplete-wrap{position:relative;}
.autocomplete-list{
  position:absolute;top:100%;left:0;right:0;
  background:#fff;border:1.5px solid #6c5ce7;border-radius:12px;
  z-index:200;max-height:180px;overflow-y:auto;
  box-shadow:0 8px 24px rgba(108,92,231,.15);
}
.autocomplete-item{
  padding:10px 14px;cursor:pointer;font-size:14px;
  border-bottom:1px solid #f0f0f0;
}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover{background:#f0eeff;color:#6c5ce7;}

/* ============================================================
   AVATAR
============================================================ */
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:16px;flex-shrink:0;
}
.avatar.lg{width:80px;height:80px;font-size:30px;}
.avatar.sm{width:32px;height:32px;font-size:13px;}
.avatar.xl{width:100px;height:100px;font-size:36px;}

/* BADGE */
.badge{
  background:#6c5ce7;color:#fff;border-radius:20px;
  padding:2px 8px;font-size:11px;font-weight:700;
}
.badge.green{background:#00b894;}
.badge.red{background:#ff4757;}
.badge.orange{background:#e67e22;}

/* ============================================================
   CHIPS (interessi)
============================================================ */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;}
.chip{
  padding:9px 16px;border-radius:20px;
  border:2px solid #e0e0e0;cursor:pointer;
  font-size:14px;display:flex;align-items:center;gap:6px;
  transition:all .2s;background:#fff;
}
.chip.selected{border-color:#6c5ce7;background:#f0eeff;color:#6c5ce7;font-weight:700;}

/* ============================================================
   SECTION HEADERS
============================================================ */
.section-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;margin-top:8px;
}
.section-title{font-weight:700;font-size:17px;}
.section-link{color:#6c5ce7;font-size:13px;cursor:pointer;}

/* ============================================================
   SEARCH BAR
============================================================ */
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:#f5f5f7;border-radius:14px;padding:10px 14px;
  margin-bottom:12px;border:1.5px solid #e8e8e8;
}
.search-bar input{
  border:none;background:transparent;padding:0;margin:0;
  font-size:14px;flex:1;
}
.search-bar input:focus{border:none;background:transparent;}

/* FILTER CHIPS */
.filters{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;}
.filters::-webkit-scrollbar{display:none;}
.filter-chip{
  padding:7px 14px;border-radius:20px;
  border:1.5px solid #e0e0e0;cursor:pointer;
  font-size:13px;white-space:nowrap;background:#fff;
  transition:all .2s;flex-shrink:0;
}
.filter-chip.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7;}

/* ============================================================
   SCROLL ROW (home cards)
============================================================ */
.scroll-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
.scroll-row::-webkit-scrollbar{display:none;}
.scroll-card{
  min-width:190px;background:#fff;border-radius:16px;
  padding:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);flex-shrink:0;
  cursor:pointer;transition:transform .15s;
}
.scroll-card:active{transform:scale(.97);}

/* ============================================================
   CHAT
============================================================ */
.chat-messages{
  display:flex;flex-direction:column;gap:8px;
  margin-bottom:14px;max-height:340px;overflow-y:auto;
}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.me{align-items:flex-end;}
.msg-wrap.them{align-items:flex-start;}
.msg-bubble{
  max-width:76%;padding:10px 14px;
  border-radius:18px;font-size:14px;line-height:1.45;
}
.msg-bubble.received{background:#f0f0f5;border-bottom-left-radius:4px;}
.msg-bubble.sent{
  background:linear-gradient(90deg,#6c5ce7,#8e7dff);
  color:#fff;border-bottom-right-radius:4px;
}
.msg-time{font-size:10px;color:#aaa;margin-top:2px;}
.msg-sender{font-size:11px;color:#6c5ce7;font-weight:700;margin-bottom:2px;}
.chat-input-row{display:flex;gap:8px;align-items:center;margin-top:4px;}
.chat-input-row input{margin:0;flex:1;}
.send-btn{
  background:linear-gradient(135deg,#6c5ce7,#8e7dff);color:#fff;
  border:none;border-radius:50%;width:44px;height:44px;
  font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
}

/* ============================================================
   TABS
============================================================ */
.tabs{display:flex;border-bottom:2px solid #eee;margin-bottom:14px;}
.tab{
  flex:1;text-align:center;padding:10px;cursor:pointer;
  font-size:14px;font-weight:700;color:#aaa;
}
.tab.active{color:#6c5ce7;border-bottom:2px solid #6c5ce7;margin-bottom:-2px;}

/* ============================================================
   PROFILE STATS
============================================================ */
.profile-stats{display:flex;border-top:1px solid #eee;border-bottom:1px solid #eee;margin:14px 0;}
.profile-stat{flex:1;text-align:center;padding:14px 0;}
.profile-stat .num{font-size:20px;font-weight:800;color:#222;}
.profile-stat .lbl{font-size:12px;color:#888;}

/* ============================================================
   MATCH ROW
============================================================ */
.match-row{
  display:flex;align-items:center;gap:12px;
  padding:13px;background:#fafafa;border-radius:14px;margin-bottom:10px;
}
.compat-bar{height:6px;border-radius:3px;background:#eee;margin-top:4px;flex:1;}
.compat-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#6c5ce7,#00b894);}
.match-pct{font-weight:800;color:#6c5ce7;font-size:16px;margin-left:auto;}

/* ============================================================
   STARS
============================================================ */
.stars{display:flex;gap:8px;font-size:36px;justify-content:center;margin:16px 0;}
.star{cursor:pointer;color:#ddd;transition:color .2s;}
.star.active{color:#f39c12;}

/* ============================================================
   NOTIFICATIONS
============================================================ */
.notif-item{
  display:flex;gap:12px;align-items:flex-start;
  padding:13px;background:#fff;border-radius:14px;
  margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.05);
}
.notif-dot{width:10px;height:10px;border-radius:50%;background:#6c5ce7;margin-top:5px;flex-shrink:0;}
.notif-dot.read{background:#ddd;}

/* ============================================================
   REPORT OPTIONS
============================================================ */
.report-option{
  padding:13px;border-radius:12px;border:1.5px solid #eee;
  margin-bottom:8px;cursor:pointer;font-size:14px;transition:all .2s;
}
.report-option.selected{border-color:#ff4757;background:#fff5f5;color:#ff4757;}

/* ============================================================
   ADMIN
============================================================ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{
  background:#fff;border-radius:14px;padding:14px;
  text-align:center;box-shadow:0 1px 8px rgba(0,0,0,.07);
}
.stat-num{font-size:22px;font-weight:800;color:#6c5ce7;}
.stat-label{font-size:11px;color:#888;margin-top:2px;}

/* ============================================================
   AI ASSISTANT
============================================================ */
.ai-bubble{
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  color:#fff;border-radius:20px 20px 20px 4px;
  padding:14px 16px;font-size:14px;line-height:1.55;margin-bottom:12px;
}
.ai-suggestion{
  background:#f8f7ff;border-radius:14px;padding:13px;
  margin-bottom:10px;border:1.5px solid #e8e4ff;cursor:pointer;
  transition:background .2s;
}
.ai-suggestion:hover{background:#f0eeff;}
.ai-typing{
  display:flex;gap:4px;align-items:center;padding:10px 14px;
}
.ai-dot{
  width:8px;height:8px;border-radius:50%;background:#6c5ce7;
  animation:bounce .9s infinite;
}
.ai-dot:nth-child(2){animation-delay:.15s;}
.ai-dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

/* ============================================================
   HERO / DETAIL
============================================================ */
.detail-hero{
  width:100%;height:180px;border-radius:16px;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:60px;margin-bottom:14px;
}
.detail-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:14px;}
.detail-row .icon{font-size:18px;width:24px;flex-shrink:0;margin-top:1px;}

/* Partecipanti avatars */
.participants-row{display:flex;margin:10px 0;}
.participant-av{
  width:32px;height:32px;border-radius:50%;border:2px solid #fff;
  margin-left:-8px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;
}
.participant-av:first-child{margin-left:0;}

/* ============================================================
   PROGRESS BAR (profilo completamento)
============================================================ */
.progress-bar{height:6px;background:#eee;border-radius:3px;margin-top:6px;}
.progress-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#6c5ce7,#00b894);transition:width .4s;}

/* ============================================================
   VERIFIED BADGE
============================================================ */
.verified-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:#e8f8f5;color:#00897b;border-radius:20px;
  padding:3px 10px;font-size:12px;font-weight:700;
}

/* ============================================================
   TOAST
============================================================ */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(50,50,50,.92);color:#fff;
  padding:10px 20px;border-radius:20px;font-size:14px;
  z-index:999;white-space:nowrap;pointer-events:none;
  animation:fadeInOut 2.8s forwards;
}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}

/* ============================================================
   MODAL (bottom sheet)
============================================================ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal{
  background:#fff;border-radius:24px 24px 0 0;
  padding:20px;width:100%;max-width:430px;
  max-height:88vh;overflow-y:auto;
}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}

/* HIDDEN */
.hidden{display:none!important;}

/* ONBOARDING */
.ob-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:6px;}
.ob-sub{font-size:14px;color:#888;text-align:center;margin-bottom:20px;}

/* SPLASH */
.splash{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;color:#fff;gap:16px;
}
.splash-logo{font-size:60px;}
.splash-name{font-size:28px;font-weight:800;letter-spacing:-.5px;}
.splash-sub{font-size:15px;opacity:.85;}
</style>
</head>

/* ================================================================
   GEOLOCATION + HAVERSINE
================================================================ */
function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}
function distLabel(ev){
  if(!userLocation||!ev.lat)return null;
  const km=parseFloat(haversine(userLocation.lat,userLocation.lng,ev.lat,ev.lng));
  return km<1?'< 1 km':km+' km';
}
async function requestGeo(){
  return new Promise(res=>{
    if(!navigator.geolocation)return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>{userLocation={lat:p.coords.latitude,lng:p.coords.longitude};res(userLocation);},
      ()=>res(null),{timeout:6000}
    );
  });
}

/* ================================================================
   NOMINATIM AUTOCOMPLETE (OpenStreetMap – no API key)
================================================================ */
let geoTimeout=null;
function setupGeoAutocomplete(inputId, listId, onSelect){
  const inp=document.getElementById(inputId);
  const lst=document.getElementById(listId);
  if(!inp||!lst)return;
  inp.addEventListener('input',()=>{
    clearTimeout(geoTimeout);
    const q=inp.value.trim();
    if(q.length<3){lst.innerHTML='';lst.style.display='none';return;}
    geoTimeout=setTimeout(async()=>{
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5&accept-language=it`,
          {headers:{'Accept-Language':'it'}});
        const data=await r.json();
        if(!data.length){lst.style.display='none';return;}
        lst.innerHTML='';lst.style.display='block';
        data.forEach(item=>{
          const div=document.createElement('div');
          div.className='autocomplete-item';
          div.textContent=item.display_name;
          div.onclick=()=>{
            inp.value=item.display_name;
            lst.style.display='none';
            if(onSelect)onSelect(item);
          };
          lst.appendChild(div);
        });
      }catch(e){lst.style.display='none';}
    },400);
  });
  document.addEventListener('click',e=>{if(!inp.contains(e.target))lst.style.display='none';});
}

function toggleInterest(label,el){
  el.classList.toggle('selected');
  if(el.classList.contains('selected')){
    if(!userInterests.includes(label))userInterests.push(label);
  } else {
    userInterests=userInterests.filter(i=>i!==label);
  }
}

function finishOnboarding(){
  if(userInterests.length<3){toast('⚠️ Seleziona almeno 3 interessi');return;}
  if(currentUser){currentUser.interests=userInterests;}
  document.getElementById('navbar').style.display='flex';
  navigate('home');
}

}

    <div class="filters" id="catFilters">

        <span style="font-size:13px;font-weight:700">📍 Distanza massima</span>

      <input type="range" id="distSlider" min="0" max="200" step="5" value="${activeFilters.maxDistance}"
             oninput="onDistSlider(this.value)" style="width:100%;accent-color:#6c5ce7;margin:0">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:4px">

    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <span style="font-size:13px;color:#888;white-space:nowrap">Ordina per:</span>

        <option value="default">Rilevanza</option>
        ${userLocation?'<option value="distance">📍 Distanza</option>':''}

      </select>
    </div>

  document.getElementById('content').innerHTML=html;

}

function setCatFilter(cat,el){
  activeFilters.category=cat;
  document.querySelectorAll('#catFilters .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterEvents();
}

function onDistSlider(val){
  activeFilters.maxDistance=parseInt(val);
  const el=document.getElementById('distVal');
  if(el)el.textContent=val>=200?'Tutte':val+' km';
  filterEvents();
}

function enableGeo(){
  navigator.geolocation.getCurrentPosition(p=>{
    userLocation={lat:p.coords.latitude,lng:p.coords.longitude};
    drawSearch();
  },()=>toast('❌ Impossibile rilevare la posizione'));
}

function filterEvents(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const city=(document.getElementById('citySearchInput')?.value||'').toLowerCase();
  const sort=document.getElementById('sortSel')?.value||'default';

  let filtered=events.filter(e=>{
    if(e.status!=='active')return false;
    const mQ=!q||e.title.toLowerCase().includes(q)||e.category.toLowerCase().includes(q)||e.description.toLowerCase().includes(q);
    const mCity=!city||e.location.toLowerCase().includes(city)||e.address.toLowerCase().includes(city);
    const mCat=!activeFilters.category||e.category===activeFilters.category;
    let mDist=true;
    if(userLocation&&e.lat&&activeFilters.maxDistance<200){
      mDist=parseFloat(haversine(userLocation.lat,userLocation.lng,e.lat,e.lng))<=activeFilters.maxDistance;
    }
    return mQ&&mCity&&mCat&&mDist;
  });

  if(sort==='distance'&&userLocation){
    filtered.sort((a,b)=>parseFloat(haversine(userLocation.lat,userLocation.lng,a.lat,a.lng))-parseFloat(haversine(userLocation.lat,userLocation.lng,b.lat,b.lng)));
  } else if(sort==='participants'){
    filtered.sort((a,b)=>b.participants.length-a.participants.length);
  } else if(sort==='price'){
    filtered.sort((a,b)=>a.price-b.price);
  }

  let html='';
  if(!filtered.length){
    html='<div style="text-align:center;color:#aaa;padding:40px 0">Nessun evento trovato</div>';
  }
  filtered.forEach(e=>{
    const dl=distLabel(e);
    const saved=savedEvents.includes(e.id);
    html+=`
      <div class="card" style="cursor:pointer">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="font-size:44px">${e.emoji}</div>
          <div style="flex:1" onclick="navigate('eventDetail',${e.id})">
            <span class="card-tag tag-${e.category.toLowerCase()}">${e.category}</span>
            <div class="card-title">${e.title}</div>
            <div class="card-meta">📅 ${e.date} • ${e.time}</div>
            <div class="card-meta">📍 ${e.location}
              ${dl?`<span style="background:#f0eeff;color:#6c5ce7;border-radius:8px;padding:1px 6px;font-size:11px;font-weight:700">📍${dl}</span>`:''}
            </div>
            <div class="card-meta">👥 ${e.participants.length}/${e.max_participants} partecipanti</div>
            ${e.price===0?'<div class="card-meta" style="color:#00b894">✅ Gratuito</div>':`<div class="card-meta" style="color:#e67e22">💰 €${e.price}</div>`}
          </div>
          <div style="font-size:22px;cursor:pointer" onclick="toggleSave(${e.id},this)">${saved?'🔖':'🔖'}</div>
        </div>
      </div>`;
  });
  document.getElementById('searchResults').innerHTML=html;
}

function toggleSave(id,el){
  if(savedEvents.includes(id)){
    savedEvents=savedEvents.filter(i=>i!==id);
    toast('Rimosso dai preferiti');
  } else {
    savedEvents.push(id);
    toast('🔖 Salvato nei preferiti!');
  }
}

================================================================ */
function drawEventDetail(eventId){
  const e=events.find(ev=>ev.id===eventId)||events[0];
  const organizer=users.find(u=>u.id===e.creator_id);
  const isMine=e.participants.includes(currentUser?.id||1);
  const dl=distLabel(e);

  let html=`
    <div class="detail-hero">${e.emoji}</div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
      <div>
        <span class="card-tag tag-${e.category.toLowerCase()}">${e.category}</span>
        <div class="card-title" style="font-size:20px">${e.title}</div>
        <div style="font-size:13px;color:#888">Organizzato da <b>${organizer?.name||'Utente'}</b> ${organizer?.verified?'✅':''}</div>
      </div>
      <span style="font-size:24px;cursor:pointer" onclick="shareEvent(${e.id})">⬆️</span>
    </div>
    <div class="detail-row"><span class="icon">📅</span><div>${e.date}<br><span style="color:#888;font-size:13px">${e.time}</span></div></div>
    <div class="detail-row"><span class="icon">📍</span><div>${e.location}<br><span style="color:#888;font-size:13px">${e.address}</span>${dl?`<br><span style="color:#6c5ce7;font-size:12px;font-weight:700">📍 ${dl} da te</span>`:''}</div></div>
    <div class="detail-row"><span class="icon">📝</span><div style="color:#555;line-height:1.5">${e.description}</div></div>
    <div class="detail-row"><span class="icon">🏷️</span><div>Categoria: ${e.category}</div></div>
    <div class="detail-row"><span class="icon">👥</span><div>Max partecipanti: ${e.max_participants}</div></div>
    ${e.price>0?`<div class="detail-row"><span class="icon">💰</span><div>€${e.price} a persona</div></div>`:
    '<div class="detail-row"><span class="icon">✅</span><div style="color:#00b894;font-weight:600">Gratuito</div></div>'}
    <div style="margin:14px 0">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">Partecipanti (${e.participants.length}/${e.max_participants})</div>
      <div class="participants-row">`;

  e.participants.slice(0,6).forEach(pid=>{
    const u=users.find(x=>x.id===pid);
    html+=`<div class="participant-av" title="${u?.name||'Utente'}">${u?.emoji||'👤'}</div>`;
  });
  if(e.participants.length>6)html+=`<div class="participant-av">+${e.participants.length-6}</div>`;

  html+=`</div></div>`;

  if(isMine){
    html+=`
      <div class="btn green" onclick="navigate('eventGroup',${e.id})">💬 Vai al Gruppo Chat</div>
      <div class="btn secondary" onclick="leaveEvent(${e.id})">Abbandona evento</div>
      <div class="btn outline" onclick="navigate('feedback',${e.id})" style="margin-top:8px">⭐ Lascia feedback</div>`;
  } else {
    const full=e.participants.length>=e.max_participants;
    html+=`
      <div class="btn ${full?'secondary':''}" onclick="${full?'toast(\"⚠️ Evento al completo!\")':'joinEvent('+e.id+')'}">${full?'🔒 Evento completo':'Partecipa'}</div>
      <div class="btn secondary" onclick="toggleSave(${e.id})" style="margin-top:8px">🔖 ${savedEvents.includes(e.id)?'Salvato':'Mi interessa'}</div>`;
  }

  html+=`
    <div style="margin-top:16px;text-align:center">
      <span style="color:#ff4757;font-size:13px;cursor:pointer" onclick="navigate('report',${e.id})">🚩 Segnala evento</span>
    </div>`;

  document.getElementById('content').innerHTML=html;
}

function joinEvent(id){
  const e=events.find(ev=>ev.id===id);
  const uid=currentUser?.id||1;
  if(e&&!e.participants.includes(uid)){
    e.participants.push(uid);
    if(!chatMessages[id])chatMessages[id]=[];
    toast(`✅ Hai aderito a "${e.title}"!`);
    notifications.unshift({id:Date.now(),text:`Hai aderito a "${e.title}"`,time:'ora',read:false,icon:'✅'});
    drawEventDetail(id);
  }
}

function leaveEvent(id){
  const e=events.find(ev=>ev.id===id);
  if(e){
    e.participants=e.participants.filter(p=>p!==(currentUser?.id||1));
    toast('👋 Hai abbandonato l\'evento');
    navigate('home');
  }
}

function shareEvent(id){
  const e=events.find(ev=>ev.id===id);
  if(navigator.share){
    navigator.share({title:e.title,text:`Vieni a ${e.title} il ${e.date}!`,url:window.location.href});
  } else {
    navigator.clipboard?.writeText(window.location.href);
    toast('🔗 Link copiato!');
  }
}

function pickEmoji(){
  let html='<div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px">';

function submitCreateEvent(){
  const title=document.getElementById('createTitle').value.trim();
  const desc=document.getElementById('createDesc').value.trim();
  const cat=document.getElementById('createCat').value;
  const dateRaw=document.getElementById('createDate').value;
  const city=document.getElementById('createCity').value.trim();
  const addr=document.getElementById('createAddr').value.trim();
  const maxP=parseInt(document.getElementById('createMax').value)||10;
  const price=parseFloat(document.getElementById('createPrice').value)||0;
  const link=document.getElementById('createLink').value.trim();
  const lat=parseFloat(document.getElementById('createCoordLat').textContent)||userLocation?.lat||45.4642;
  const lng=parseFloat(document.getElementById('createCoordLng').textContent)||userLocation?.lng||9.1900;

  if(!title){toast('⚠️ Inserisci il titolo');return;}
  if(!cat){toast('⚠️ Seleziona la categoria');return;}
  if(!dateRaw){toast('⚠️ Inserisci data e ora');return;}
  if(!city){toast('⚠️ Inserisci la città');return;}
  if(!addr){toast('⚠️ Inserisci l\'indirizzo');return;}

  const dt=new Date(dateRaw);
  const dateStr=dt.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  const timeStr=dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

  const newEvent={
    id:events.length+1,title,description:desc,category:cat,
    date:dateStr.charAt(0).toUpperCase()+dateStr.slice(1),
    time:timeStr,location:city,address:addr,
    participants:[currentUser?.id||1],max_participants:maxP,
    price,emoji:selectedEmoji,creator_id:currentUser?.id||1,
    tags:[cat],lat,lng,status:'active',
    external_link:link||null
  };

  events.unshift(newEvent);
  chatMessages[newEvent.id]=[];
  selectedEmoji='🎉';
  toast(`✅ "${title}" creato con successo!`);
  notifications.unshift({id:Date.now(),text:`Hai creato "${title}"`,time:'ora',read:false,icon:'🎉'});
  navigate('eventDetail',newEvent.id);
}

/* ================================================================
   EVENT GROUP (Chat + Partecipanti + Dettagli)
================================================================ */
function drawEventGroup(eventId){
  const e=events.find(ev=>ev.id===eventId)||events[0];
  let html=`
    <div style="background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <div style="font-size:28px">${e.emoji}</div>
      <div><div style="font-weight:700;font-size:15px">${e.title}</div>
      <div style="font-size:12px;color:#888">${e.participants.length} partecipanti</div></div>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='chat'?'active':''}" onclick="switchTab('chat',${e.id})">💬 Chat</div>
      <div class="tab ${activeTab==='participants'?'active':''}" onclick="switchTab('participants',${e.id})">👥 Partecipanti</div>
      <div class="tab ${activeTab==='details'?'active':''}" onclick="switchTab('details',${e.id})">ℹ️ Dettagli</div>
    </div>
    <div id="groupTabContent">`;

  if(activeTab==='chat') html+=renderChat(e);
  else if(activeTab==='participants') html+=renderParticipants(e);
  else html+=renderEventDetails(e);

  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}

function switchTab(tab,eventId){
  activeTab=tab;
  drawEventGroup(eventId);
}

function renderChat(e){
  const msgs=chatMessages[e.id]||[];
  let html=`<div class="chat-messages" id="chatMsgs">`;
  msgs.forEach(m=>{
    const sender=users.find(u=>u.id===m.sender_id);
    const isMine=m.sender_id===(currentUser?.id||1);
    html+=`<div class="msg-wrap ${isMine?'me':'them'}">
      ${!isMine?`<div class="msg-sender">${sender?.name||'Utente'}</div>`:''}
      <div class="msg-bubble ${isMine?'sent':'received'}">${m.text}</div>
      <div class="msg-time">${m.time}</div>
    </div>`;
  });
  if(!msgs.length) html+=`<div style="text-align:center;color:#aaa;padding:20px">Nessun messaggio ancora. Inizia la conversazione! 👋</div>`;
  html+=`</div>
    <div class="chat-input-row">
      <input id="msgInput" placeholder="Scrivi un messaggio..."
             onkeypress="if(event.key==='Enter')sendMessage(${e.id})">
      <button class="send-btn" onclick="sendMessage(${e.id})">➤</button>
    </div>`;
  return html;
}

function sendMessage(eventId){
  const inp=document.getElementById('msgInput');
  if(!inp||!inp.value.trim())return;
  const now=new Date();
  const time=`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(!chatMessages[eventId])chatMessages[eventId]=[];
  chatMessages[eventId].push({sender_id:currentUser?.id||1,text:inp.value.trim(),time});
  // Notifica simulata
  notifications.unshift({id:Date.now(),text:'Hai inviato un messaggio nel gruppo',time:'ora',read:true,icon:'💬'});
  inp.value='';

  userInterests=currentUser.interests;
}

function saveProfile(){
  if(!currentUser)return;
  currentUser.bio=document.getElementById('editBio').value;
  currentUser.city=document.getElementById('editCity').value;
  currentUser.completeness=Math.min(100,(currentUser.completeness||70)+10);

  if(idx>=0)users[idx]={...currentUser};
  toast('✅ Profilo aggiornato!');
  drawProfile();

function sendAI(){
  const inp=document.getElementById('aiInput');
  if(!inp||!inp.value.trim())return;
  const text=inp.value.trim();
  inp.value='';
  const chat=document.getElementById('aiChatMsgs');

  // Messaggio utente
  const userWrap=document.createElement('div');
  userWrap.className='msg-wrap me';
  userWrap.innerHTML=`<div class="msg-bubble sent">${text}</div>`;
  chat.appendChild(userWrap);
  chat.scrollTop=chat.scrollHeight;

  // Typing indicator
  const typingWrap=document.createElement('div');
  typingWrap.className='msg-wrap them';
  typingWrap.id='aiTyping';
  typingWrap.innerHTML=`<div class="msg-bubble received"><div class="ai-typing">
    <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
  </div></div>`;
  chat.appendChild(typingWrap);
  chat.scrollTop=chat.scrollHeight;

  setTimeout(()=>{
    const typing=document.getElementById('aiTyping');
    if(typing)typing.remove();

    const result=getAIReply(text);
    const aiWrap=document.createElement('div');
    aiWrap.className='msg-wrap them';
    aiWrap.innerHTML=`<div class="msg-bubble received" style="background:#f0eeff">${result.reply}</div>`;
    chat.appendChild(aiWrap);

    // Se c'è un evento suggerito, mostra shortcut
    if(result.suggest){
      const ev=events.find(e=>e.id===result.suggest);
      if(ev){
        const card=document.createElement('div');
        card.className='ai-suggestion';
        card.style.marginTop='8px';
        card.onclick=()=>navigate('eventDetail',ev.id);
        card.innerHTML=`<div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:24px">${ev.emoji}</span>
          <div><div style="font-weight:700;font-size:13px">${ev.title}</div>
          <div style="font-size:12px;color:#888">${ev.date}</div></div>
          <div style="margin-left:auto">›</div></div>`;
        chat.appendChild(card);
      }
    }
    chat.scrollTop=chat.scrollHeight;
  },1000);
}

function drawMatchPeople(){
  const me=currentUser||users[0];
  const others=users.filter(u=>u.id!==me.id&&!blockedUsers.includes(u.id));
  let html=`
    <div style="font-size:14px;color:#888;margin-bottom:16px">Basato sui tuoi interessi in comune</div>`;

  const withScore=others.map(u=>{
    const common=(me.interests||[]).filter(i=>(u.interests||[]).includes(i));
    const total=new Set([...(me.interests||[]),...(u.interests||[])]).size;
    const pct=Math.min(95,Math.round((common.length/Math.max(total,1))*100+40));
    return{...u,common,pct};
  }).sort((a,b)=>b.pct-a.pct);

  withScore.forEach(u=>{
    const dl=userLocation&&u.lat?haversine(userLocation.lat,userLocation.lng,u.lat,u.lng)+' km':null;
    html+=`
      <div class="match-row">
        <div class="avatar">${u.emoji||'👤'}</div>
        <div style="flex:1">
          <div style="font-weight:700">${u.name} ${u.verified?'✅':''}</div>
          <div style="font-size:12px;color:#888">${u.age} anni • ${u.city}${dl?` • 📍${dl}`:''}</div>
          <div style="font-size:12px;color:#6c5ce7;margin:2px 0">
            Interessi in comune: ${u.common.length} (${u.common.join(', ')||'nessuno'})
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="compat-bar"><div class="compat-fill" style="width:${u.pct}%"></div></div>
          </div>
        </div>
        <div class="match-pct">${u.pct}%</div>
      </div>`;
  });

  document.getElementById('content').innerHTML=html;
}

          <div style="flex:1">
            <div style="font-weight:700">${u.name} ${u.verified?'✅':''}</div>
            <div style="font-size:12px;color:#888">${u.city} • ${u.age} anni</div>
          </div>
          <div style="display:flex;gap:6px">
            <div class="btn sm secondary" onclick="toast('Ban inviato')">🚫</div>
            <div class="btn sm outline" onclick="toast('Sospeso')">⏸</div>
          </div>
        </div>
      </div>`;
  });
  return html;
}

function renderAdminEvents(){
  let html='';
  events.slice(0,6).forEach(e=>{
    html+=`
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:30px">${e.emoji}</span>
          <div style="flex:1">
            <div style="font-weight:700">${e.title}</div>
            <div style="font-size:12px;color:#888">${e.date} • ${e.participants.length} partecipanti</div>
          </div>
          <div class="btn sm danger" onclick="removeEvent(${e.id})">🗑️</div>
        </div>
      </div>`;
  });
  return html;
}

function adminAction(id,status,action){
  const r=reports.find(rep=>rep.id===id);
  if(r)r.status=status;
  toast(action==='block'?'🚫 Utente bloccato':action==='suspend'?'⏸ Utente sospeso':'✅ Segnalazione archiviata');
  drawAdmin();
}

function removeEvent(id){
  const idx=events.findIndex(e=>e.id===id);
  if(idx>=0){events[idx].status='removed';toast('🗑️ Evento rimosso');}
  drawAdmin();
}
</script>
</body>
</html>
