<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventConnect MVP</title>

<style>
body {
    font-family: Arial;
    padding: 40px;
    background:#f4f6f9;
}

.container {
    max-width:600px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input {
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

.city-input-wrap {
    position:relative;
}

.city-suggestions {
    position:absolute;
    top:100%;
    left:0;
    right:0;
    background:white;
    border:1px solid #ddd;
    border-radius:8px;
    max-height:200px;
    overflow-y:auto;
    display:none;
    z-index:999;
}

.city-suggestions.open {
    display:block;
}

.city-suggestion-item {
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #eee;
}

.city-suggestion-item:hover {
    background:#f0f4ff;
}

.event-card {
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    background:#003580;
    color:white;
}
</style>
</head>

<body>

<div class="container">
    <h2>EventConnect - Test Autocomplete 🌍</h2>

    <label>Città</label>
    <div class="city-input-wrap">
        <input type="text" id="cityInput" placeholder="Es. Milano, New York..."
               oninput="cityAutocomplete(this,'suggestions')">
        <div id="suggestions" class="city-suggestions"></div>
    </div>

    <div id="event"></div>
</div>

<script>

// ============================
// AUTOCOMPLETE MONDIALE (NOMINATIM)
// ============================

let debounceTimers = {};

function cityAutocomplete(inputEl, suggId) {
    const query = inputEl.value.trim();
    const container = document.getElementById(suggId);

    if (query.length < 2) {
        closeSuggestions(container);
        return;
    }

    container.innerHTML = "<div class='city-suggestion-item'>⏳ caricamento...</div>";
    container.classList.add("open");

    clearTimeout(debounceTimers[inputEl.id]);

    debounceTimers[inputEl.id] = setTimeout(() => {
        fetchCities(query, container, inputEl);
    }, 300);
}

function fetchCities(query, container, inputEl) {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`;

    fetch(url)
    .then(res => res.json())
    .then(data => renderCities(data, container, inputEl))
    .catch(() => {
        container.innerHTML = "<div class='city-suggestion-item'>⚠️ errore</div>";
    });
}

function renderCities(results, container, inputEl) {
    if (!results.length) {
        container.innerHTML = "<div class='city-suggestion-item'>Nessun risultato</div>";
        return;
    }

    container.innerHTML = results.map(city => {
        const name = city.display_name.split(",")[0];
        return `
            <div class="city-suggestion-item" data-value="${name}">
                📍 ${name}
            </div>
        `;
    }).join("");

    container.querySelectorAll(".city-suggestion-item").forEach(el => {
        el.addEventListener("click", () => {
            inputEl.value = el.dataset.value;
            closeSuggestions(container);
        });
    });
}

function closeSuggestions(container) {
    container.classList.remove("open");
}

// chiusura click fuori
document.addEventListener("click", e => {
    if (!e.target.closest(".city-input-wrap")) {
        document.querySelectorAll(".city-suggestions").forEach(closeSuggestions);
    }
});


// ============================
// EVENTO DEMO MINIMALE
// ============================

const EVENTS = [
    {
        title: "Evento demo Milano",
        city: "Milano",
        description: "Questo è un evento di test"
    }
];

// render evento base
document.getElementById("event").innerHTML = `
    <div class="event-card">
        <h3>${EVENTS[0].title}</h3>
        <p>${EVENTS[0].city}</p>
        <p>${EVENTS[0].description}</p>
    </div>
`;

</script>

</body>
</html>
