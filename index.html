/* HEADER */

.header-right{display:flex;align-items:center;gap:12px;}

.badge-dot{
  position:absolute;top:-2px;right:-2px;

}

/* CONTENT */
.content{

  -webkit-overflow-scrolling:touch;
}
.content::-webkit-scrollbar{display:none;}

/* NAVBAR */

.btn.outline{background:transparent;color:#6c5ce7;border:1.5px solid #6c5ce7;}

.btn.green{background:linear-gradient(90deg,#00b894,#55efc4);}

/* CARDS */

}
.card-title{font-weight:700;font-size:16px;margin-bottom:4px;}
.card-meta{font-size:13px;color:#666;display:flex;align-items:center;gap:6px;margin-bottom:3px;}

.tag-arte{background:#fce4ec;color:#c2185b;}
.tag-sport{background:#e8f8f5;color:#00897b;}
.tag-trekking{background:#e8f5e9;color:#388e3c;}
.tag-food{background:#fff3e0;color:#e65100;}
.tag-cinema{background:#e3f2fd;color:#1565c0;}
.tag-teatro{background:#f3e5f5;color:#7b1fa2;}
.tag-viaggi{background:#e0f7fa;color:#00838f;}
.tag-tecnologia{background:#e8eaf6;color:#3949ab;}
.tag-altro{background:#f5f5f5;color:#555;}

.tag-benessere{background:#f1f8e9;color:#558b2f;}

input,textarea,select{

input:focus,textarea:focus,select:focus{border-color:#6c5ce7;background:#fff;}

/* TOAST */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(50,50,50,.92);color:#fff;
  padding:10px 20px;border-radius:20px;font-size:14px;
  z-index:999;white-space:nowrap;pointer-events:none;
  animation:fadeInOut 2.8s forwards;
}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:#888;}
.spinner{width:36px;height:36px;border:3px solid #f0eeff;border-top:3px solid #6c5ce7;border-radius:50%;animation:spin .8s linear infinite;}

.splash-logo{font-size:60px;}

</style>

/* ================================================================
   GEOLOCATION + HAVERSINE
================================================================ */
function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}
function distLabel(ev){
  if(!userLocation||!ev.latitude)return null;
  const km=parseFloat(haversine(userLocation.lat,userLocation.lng,ev.latitude,ev.longitude));
  return km<1?'< 1 km':km+' km';
}
async function requestGeo(){
  return new Promise(res=>{
    if(!navigator.geolocation)return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>{userLocation={lat:p.coords.latitude,lng:p.coords.longitude};res(userLocation);},
      ()=>res(null),{timeout:6000}
    );
  });
}

/* ================================================================
   NOMINATIM AUTOCOMPLETE
================================================================ */
let geoTimeout=null;
function setupGeoAutocomplete(inputId,listId,onSelect){
  const inp=document.getElementById(inputId);
  const lst=document.getElementById(listId);
  if(!inp||!lst)return;
  inp.addEventListener('input',()=>{
    clearTimeout(geoTimeout);
    const q=inp.value.trim();
    if(q.length<3){lst.innerHTML='';lst.style.display='none';return;}
    geoTimeout=setTimeout(async()=>{
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5&accept-language=it`);
        const data=await r.json();
        if(!data.length){lst.style.display='none';return;}
        lst.innerHTML='';lst.style.display='block';
        data.forEach(item=>{
          const div=document.createElement('div');
          div.className='autocomplete-item';
          div.textContent=item.display_name;
          div.onclick=()=>{
            inp.value=item.display_name;
            lst.style.display='none';
            if(onSelect)onSelect(item);
          };
          lst.appendChild(div);
        });
      }catch(e){lst.style.display='none';}
    },400);
  });
  document.addEventListener('click',e=>{if(!inp.contains(e.target))lst.style.display='none';});
}

  {kw:['sport','calcio','palestra','kayak'],reply:'⚽ Ho trovato eventi sportivi adatti a te!',suggest:'Sport'},
  {kw:['amici','persone','conoscere','match'],reply:'🤝 Ho analizzato il tuo profilo. Vuoi vedere le persone più compatibili con te?'},
  {kw:['vicino','zona','distanza'],reply:'📍 Attiva la geolocalizzazione per vedere gli eventi più vicini a te!'},
];

function getAIReply(text){
  const t=text.toLowerCase();
  for(const r of aiResponses){
    if(r.kw.some(k=>t.includes(k)))return r;
  }
  return {reply:'Ciao! Puoi chiedermi di trovare eventi per musica, trekking, arte, sport, cibo. Cosa ti piace? 😊'};
}

const NAV_PAGES=['home','search','create','chatList','profile'];
const PAGE_TITLES={
  home:'',search:'Cerca Eventi',create:'Crea Attività',
  chatList:'Chat',profile:'Profilo',onboarding:'I tuoi interessi',
  login:'Accedi',register:'Registrati',eventDetail:'Dettaglio Evento',
  eventGroup:'Gruppo Evento',aiAssistant:'AI Assistant',
  matchPeople:'Match Persone',feedback:'Feedback Post-Evento',
  notifications:'Notifiche',admin:'Admin Dashboard',
  report:'Segnala',savedEvents:'Preferiti'
};

function navigate(page,param){
  if(page!==currentPage)navHistory.push(currentPage);
  currentPage=page;
  if(param!==undefined)currentEventId=param;
  updateShell(page);
  const map={
    home:drawHome,search:drawSearch,create:drawCreate,
    chatList:drawChatList,profile:drawProfile,
    onboarding:drawOnboarding,login:drawLogin,register:drawRegister,
    eventDetail:()=>drawEventDetail(currentEventId),
    eventGroup:()=>drawEventGroup(currentEventId),
    aiAssistant:drawAI,matchPeople:drawMatchPeople,
    feedback:()=>drawFeedback(currentEventId),
    notifications:drawNotifications,admin:drawAdmin,
    report:()=>drawReport(currentEventId),
    savedEvents:drawSavedEvents
  };
  if(map[page])map[page]();
  document.getElementById('content').scrollTop=0;
}

function goBack(){
  if(navHistory.length)navigate(navHistory.pop());
}

function updateShell(page){
  document.getElementById('navbar').style.display=
    ['login','register','onboarding'].includes(page)?'none':'flex';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navMap={home:'nav-home',search:'nav-search',create:'nav-create',chatList:'nav-chatList',profile:'nav-profile'};
  if(navMap[page])document.getElementById(navMap[page])?.classList.add('active');

  const logo=document.getElementById('headerLogo');
  const title=document.getElementById('headerTitle');
  const backBtn=document.getElementById('backBtn');
  const headerRight=document.getElementById('headerRight');
  const noBack=['home','search','create','chatList','profile','login','register','onboarding'];
  backBtn.style.display=noBack.includes(page)?'none':'block';

  if(page==='home'){
    logo.classList.remove('hidden');title.classList.add('hidden');
    headerRight.innerHTML=`
      <span class="header-icon" onclick="navigate('savedEvents')">🔖</span>
      <span class="header-icon" onclick="navigate('notifications')" style="position:relative">
        🔔<span class="badge-dot" style="${notifications.some(n=>!n.read)?'':'display:none'}"></span>
      </span>`;
  } else if(page==='admin'){
    logo.classList.add('hidden');title.classList.remove('hidden');
    title.textContent='⚙️ Admin Dashboard';
    headerRight.innerHTML=`<span class="header-icon" onclick="doLogout()">🚪</span>`;
  } else {
    logo.classList.add('hidden');title.classList.remove('hidden');
    title.textContent=PAGE_TITLES[page]||page;
    headerRight.innerHTML=page==='profile'?`<span class="header-icon" onclick="navigate('aiAssistant')">🤖</span>`:'';
  }
}

function drawOnboarding(){
  let html=`
    <div style="text-align:center;padding:20px 0 16px">
      <h2 style="font-size:22px;font-weight:800">Quali sono i tuoi interessi?</h2>
      <p style="color:#888;font-size:14px;margin-top:6px">Seleziona almeno 3 per trovare le esperienze perfette</p>
    </div>
    <div class="chips" id="interestChips">`;
  allInterests.forEach(i=>{
    const sel=userInterests.includes(i.label)?'selected':'';
    html+=`<div class="chip ${sel}" onclick="toggleInterest('${i.label}',this)">${i.icon} ${i.label}</div>`;
  });
  html+=`</div>
    <div style="margin-top:24px">
      <div class="btn" onclick="finishOnboarding()">Continua</div>
      <div class="btn secondary" style="margin-top:8px" onclick="navigate('home')">Salta per ora</div>
    </div>`;
  document.getElementById('content').innerHTML=html;
}

function toggleInterest(label,el){
  el.classList.toggle('selected');
  if(el.classList.contains('selected')){
    if(!userInterests.includes(label))userInterests.push(label);
  } else {
    userInterests=userInterests.filter(i=>i!==label);
  }
}

async function finishOnboarding(){
  if(userInterests.length<3){toast('⚠️ Seleziona almeno 3 interessi');return;}
  if(currentUser?.id&&currentUser.id!=='admin'){
    // Salva interessi su Supabase
    await supabase.from('user_interests').delete().eq('user_id',currentUser.id);
    // Recupera id interessi
    const {data:interestRows}=await supabase
      .from('interests').select('id,name').in('name',userInterests);
    if(interestRows?.length){
      await supabase.from('user_interests').insert(
        interestRows.map(i=>({user_id:currentUser.id,interest_id:i.id}))
      );
    }
    currentUser.interests=userInterests;
    // Aggiorna completeness
    await supabase.from('profiles')
      .update({completeness:60}).eq('id',currentUser.id);
  }
  toast('✅ Interessi salvati!');
  navigate('home');
}

function setCatFilter(cat,el){
  activeFilters.category=cat;
  document.querySelectorAll('#catFilters .filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterEvents();

function onDistSlider(val){
  activeFilters.maxDistance=parseInt(val);
  const el=document.getElementById('distVal');
  if(el)el.textContent=val>=200?'Tutte':val+' km';
  filterEvents();
}

function enableGeo(){
  navigator.geolocation.getCurrentPosition(p=>{
    userLocation={lat:p.coords.latitude,lng:p.coords.longitude};
    drawSearch();
  },()=>toast('❌ Impossibile rilevare la posizione'));
}

function filterEvents(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const city=(document.getElementById('citySearchInput')?.value||'').toLowerCase();
  const sort=document.getElementById('sortSel')?.value||'default';

  let filtered=events.filter(e=>{
    const mQ=!q||e.title.toLowerCase().includes(q)||(e.category||'').toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q);
    const mCity=!city||(e.location||'').toLowerCase().includes(city);
    const mCat=!activeFilters.category||e.category===activeFilters.category;
    let mDist=true;
    if(userLocation&&e.latitude&&activeFilters.maxDistance<200){
      mDist=parseFloat(haversine(userLocation.lat,userLocation.lng,e.latitude,e.longitude))<=activeFilters.maxDistance;
    }
    return mQ&&mCity&&mCat&&mDist;
  });

  if(sort==='distance'&&userLocation){
    filtered.sort((a,b)=>parseFloat(haversine(userLocation.lat,userLocation.lng,a.latitude,a.longitude))-parseFloat(haversine(userLocation.lat,userLocation.lng,b.latitude,b.longitude)));
  } else if(sort==='price'){
    filtered.sort((a,b)=>a.price-b.price);
  }

  let html='';

    toast('🔖 Salvato nei preferiti!');

}

async function drawEventDetail(eventId){
  showLoading();
  // Carica evento fresco da Supabase
  const {data:e,error}=await supabase
    .from('events').select('*').eq('id',eventId).single();
  if(error||!e){toast('❌ Evento non trovato');goBack();return;}

  // Conta partecipanti
  const {count:partCount}=await supabase
    .from('event_participants')
    .select('*',{count:'exact',head:true})
    .eq('event_id',eventId);

  // Controlla se partecipo
  let isMine=false;
  if(currentUser?.id&&currentUser.id!=='admin'){
    const {data:myPart}=await supabase
      .from('event_participants')
      .select('user_id').eq('event_id',eventId).eq('user_id',currentUser.id).single();
    isMine=!!myPart;
  }

  const dl=distLabel(e);
  const isSaved=savedEvents.includes(e.id);

  let html=`
    <div class="detail-hero">${e.emoji||'🎉'}</div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
      <div>
        <span class="card-tag tag-${(e.category||'altro').toLowerCase()}">${e.category||'Altro'}</span>
        <div class="card-title" style="font-size:20px">${e.title}</div>
      </div>
      <span style="font-size:24px;cursor:pointer" onclick="shareEvent(${e.id})">⬆️</span>
    </div>
    <div class="detail-row"><span class="icon">📍</span>
      <div>${e.location||''}${e.address?`<br><span style="color:#888;font-size:13px">${e.address}</span>`:''}
      ${dl?`<br><span style="color:#6c5ce7;font-size:12px;font-weight:700">📍 ${dl} da te</span>`:''}</div>
    </div>
    ${e.date_time?`<div class="detail-row"><span class="icon">📅</span>${new Date(e.date_time).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})}</div>`:''}
    <div class="detail-row"><span class="icon">📝</span><div style="color:#555;line-height:1.5">${e.description||'Nessuna descrizione'}</div></div>
    <div class="detail-row"><span class="icon">👥</span>${partCount||0}/${e.max_participants} partecipanti</div>
    ${e.price===0?'<div class="detail-row"><span class="icon">✅</span><div style="color:#00b894;font-weight:600">Gratuito</div></div>':`<div class="detail-row"><span class="icon">💰</span>€${e.price} a persona</div>`}
    ${e.external_link?`<div class="detail-row"><span class="icon">🔗</span><a href="${e.external_link}" target="_blank" style="color:#6c5ce7;font-size:13px">Sito esterno</a></div>`:''}`;

  if(isMine){
    html+=`
      <div class="btn green" onclick="navigate('eventGroup',${e.id})">💬 Vai al Gruppo Chat</div>
      <div class="btn secondary" onclick="leaveEvent(${e.id})">Abbandona evento</div>
      <div class="btn outline" onclick="navigate('feedback',${e.id})" style="margin-top:8px">⭐ Lascia feedback</div>`;
  } else {
    const full=(partCount||0)>=e.max_participants;
    html+=`
      <div class="btn ${full?'secondary':''}" onclick="${full?`toast('⚠️ Evento al completo!')`:`joinEvent(${e.id})`}">${full?'🔒 Evento completo':'Partecipa'}</div>
      <div class="btn secondary" onclick="toggleSave(${e.id})" style="margin-top:8px">🔖 ${isSaved?'Salvato ✓':'Mi interessa'}</div>`;
  }

  html+=`<div style="margin-top:16px;text-align:center">
    <span style="color:#ff4757;font-size:13px;cursor:pointer" onclick="navigate('report',${e.id})">🚩 Segnala evento</span>
  </div>`;

  document.getElementById('content').innerHTML=html;
}

async function joinEvent(id){
  if(!currentUser||!isLoggedIn){toast('⚠️ Devi essere loggato');navigate('login');return;}
  const {error}=await supabase.from('event_participants').insert({
    event_id:id,user_id:currentUser.id
  });
  if(error){toast('❌ '+error.message);return;}
  toast('✅ Hai aderito all\'evento!');
  notifications.unshift({id:Date.now(),text:'Hai aderito a un evento!',time:'ora',read:false,icon:'✅'});
  drawEventDetail(id);
}

async function leaveEvent(id){
  const {error}=await supabase.from('event_participants')
    .delete().eq('event_id',id).eq('user_id',currentUser.id);
  if(error){toast('❌ '+error.message);return;}
  toast('👋 Hai abbandonato l\'evento');
  navigate('home');
}

function shareEvent(id){
  const e=events.find(ev=>ev.id===id);
  if(navigator.share){
    navigator.share({title:e?.title||'EventConnect',text:'Vieni a questo evento!',url:window.location.href});
  } else {
    navigator.clipboard?.writeText(window.location.href);
    toast('🔗 Link copiato!');
  }
}

const emojiOptions=['🎷','🖼️','🍹','⚽','🥾','🏔️','🚣','🎸','🎭','🎬','🍕','✈️','💻','🧘','🎉','🎨','🏋️','🎤'];
function pickEmoji(){
  let html='<div style="display:flex;flex-wrap:wrap;gap:12px;padding:8px;justify-content:center">';
  emojiOptions.forEach(em=>{
    html+=`<div style="font-size:34px;cursor:pointer;padding:4px" onclick="chooseEmoji('${em}')">${em}</div>`;
  });

  selectedEmoji=em;
  document.getElementById('eventEmojiPicker').textContent=em;
  closeModal();

async function submitCreateEvent(){
  const title=document.getElementById('createTitle').value.trim();
  const desc=document.getElementById('createDesc').value.trim();
  const cat=document.getElementById('createCat').value;
  const dateRaw=document.getElementById('createDate').value;
  const city=document.getElementById('createCity').value.trim();
  const addr=document.getElementById('createAddr').value.trim();
  const maxP=parseInt(document.getElementById('createMax').value)||10;
  const price=parseFloat(document.getElementById('createPrice').value)||0;
  const link=document.getElementById('createLink').value.trim();
  const lat=parseFloat(document.getElementById('createCoordLat').textContent)||null;
  const lng=parseFloat(document.getElementById('createCoordLng').textContent)||null;

  if(!title){toast('⚠️ Inserisci il titolo');return;}
  if(!cat){toast('⚠️ Seleziona la categoria');return;}
  if(!dateRaw){toast('⚠️ Inserisci data e ora');return;}
  if(!city){toast('⚠️ Inserisci la città');return;}
  if(!addr){toast('⚠️ Inserisci l\'indirizzo');return;}
  if(!maxP||maxP<2){toast('⚠️ Inserisci il numero massimo di partecipanti (min 2)');return;}

  toast('⏳ Creazione in corso...');

  const {data,error}=await supabase.from('events').insert({
    creator_id:currentUser.id,
    title,description:desc,category:cat,
    date_time:new Date(dateRaw).toISOString(),
    location:city,address:addr,
    max_participants:maxP,price,
    emoji:selectedEmoji,
    latitude:lat,longitude:lng,
    external_link:link||null,
    status:'active'
  }).select().single();

  if(error){toast('❌ '+error.message);return;}

  // Creatore come primo partecipante
  await supabase.from('event_participants').insert({
    event_id:data.id,user_id:currentUser.id
  });

  // Aggiorna lista locale
  await loadEvents();
  notifications.unshift({id:Date.now(),text:`Hai creato "${title}"`,time:'ora',read:false,icon:'🎉'});
  toast('✅ Evento creato con successo!');
  navigate('eventDetail',data.id);
}

async function drawEventGroup(eventId){
  const {data:e}=await supabase.from('events').select('*').eq('id',eventId).single();
  if(!e)return;
  document.getElementById('headerTitle').textContent=e.title;

  let html=`
    <div style="background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <div style="font-size:28px">${e.emoji||'🎉'}</div>
      <div><div style="font-weight:700">${e.title}</div>
      <div style="font-size:12px;color:#888">${e.location||''}</div></div>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='chat'?'active':''}" onclick="switchTab('chat',${e.id})">💬 Chat</div>
      <div class="tab ${activeTab==='participants'?'active':''}" onclick="switchTab('participants',${e.id})">👥 Partecipanti</div>
      <div class="tab ${activeTab==='details'?'active':''}" onclick="switchTab('details',${e.id})">ℹ️ Dettagli</div>
    </div>
    <div id="groupTabContent">`;

  if(activeTab==='chat') html+=await renderChat(e);
  else if(activeTab==='participants') html+=await renderParticipants(e);
  else html+=renderEventDetails(e);

  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}

function switchTab(tab,eventId){
  activeTab=tab;
  drawEventGroup(eventId);
}

async function renderChat(e){
  const {data:msgs}=await supabase
    .from('messages')
    .select('*,profiles(name,emoji)')
    .eq('event_id',e.id)
    .order('created_at',{ascending:true});

  let html=`<div class="chat-messages" id="chatMsgs">`;
  if(!msgs||!msgs.length){
    html+=`<div style="text-align:center;color:#aaa;padding:20px">Nessun messaggio. Inizia la conversazione! 👋</div>`;
  }
  (msgs||[]).forEach(m=>{
    const isMine=m.sender_id===currentUser?.id;
    const time=new Date(m.created_at).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    html+=`<div class="msg-wrap ${isMine?'me':'them'}">
      ${!isMine?`<div class="msg-sender">${m.profiles?.name||'Utente'}</div>`:''}
      <div class="msg-bubble ${isMine?'sent':'received'}">${m.message}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  });
  html+=`</div>
    <div class="chat-input-row">
      <input id="msgInput" placeholder="Scrivi un messaggio..."
             onkeypress="if(event.key==='Enter')sendMessage(${e.id})">
      <button class="send-btn" onclick="sendMessage(${e.id})">➤</button>
    </div>`;
  return html;
}

async function sendMessage(eventId){
  const inp=document.getElementById('msgInput');
  if(!inp||!inp.value.trim())return;
  if(!isLoggedIn){toast('⚠️ Devi essere loggato');return;}

  const {error}=await supabase.from('messages').insert({
    event_id:eventId,
    sender_id:currentUser.id,
    message:inp.value.trim()
  });
  if(error){toast('❌ '+error.message);return;}
  inp.value='';
  await drawEventGroup(eventId);
  setTimeout(()=>{
    const c=document.getElementById('chatMsgs');
    if(c)c.scrollTop=c.scrollHeight;
  },50);
}

  const {data:parts}=await supabase

      <div style="font-weight:700;margin-bottom:12px">✏️ Modifica profilo</div>
      <label>Bio</label>
      <textarea id="editBio" rows="2" placeholder="Raccontati...">${currentUser.bio||''}</textarea>
      <label>Città</label>
      <div class="autocomplete-wrap">
        <input id="editCity" value="${currentUser.city||''}" autocomplete="off">
        <div class="autocomplete-list" id="editCityList" style="display:none"></div>
      </div>
      <label>Interessi</label>
      <div class="chips" id="profileChips">
        ${allInterests.map(i=>`
          <div class="chip ${userInterests.includes(i.label)?'selected':''}"
               onclick="toggleProfileInterest('${i.label}',this)">${i.icon} ${i.label}</div>`).join('')}
      </div>
      <div class="btn" onclick="saveProfile()" style="margin-top:14px">💾 Salva modifiche</div>
    </div>
    <div class="btn secondary" onclick="navigate('matchPeople')">🤝 Persone compatibili</div>
    <div class="btn secondary" onclick="navigate('aiAssistant')" style="margin-top:8px">🤖 AI Assistant</div>
    <div class="btn danger" onclick="doLogout()" style="margin-top:8px">🚪 Esci</div>`;

  document.getElementById('content').innerHTML=html;
  setupGeoAutocomplete('editCity','editCityList',item=>{
    const city=item.address?.city||item.address?.town||item.display_name.split(',')[0];
    document.getElementById('editCity').value=city;
  });
}

function toggleProfileInterest(label,el){
  el.classList.toggle('selected');
  if(el.classList.contains('selected')){
    if(!userInterests.includes(label))userInterests.push(label);
  } else {
    userInterests=userInterests.filter(i=>i!==label);
  }
}

async function saveProfile(){
  const bio=document.getElementById('editBio').value;
  const city=document.getElementById('editCity').value;

  const {error}=await supabase.from('profiles').update({
    bio,city,
    completeness:Math.min(100,(currentUser.completeness||40)+15)
  }).eq('id',currentUser.id);

  if(error){toast('❌ '+error.message);return;}

  // Aggiorna interessi
  await supabase.from('user_interests').delete().eq('user_id',currentUser.id);
  const {data:interestRows}=await supabase
    .from('interests').select('id,name').in('name',userInterests);
  if(interestRows?.length){
    await supabase.from('user_interests').insert(
      interestRows.map(i=>({user_id:currentUser.id,interest_id:i.id}))
    );
  }

  currentUser.bio=bio;currentUser.city=city;currentUser.interests=userInterests;
  toast('✅ Profilo aggiornato!');
  drawProfile();
}

/* ================================================================
   AI ASSISTANT
================================================================ */
function drawAI(){
  const user=currentUser||{name:'Utente'};
  let html=`
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:50px">🤖</div>
      <div style="font-weight:700;font-size:18px">AI Assistant</div>
      <div style="font-size:13px;color:#888">Il tuo assistente personale</div>
    </div>
    <div class="ai-bubble">
      Ciao ${user.name?.split(' ')[0]||''}! 👋<br>
      Dimmi cosa vorresti fare e ti aiuto a trovare le esperienze perfette.<br><br>
      <b>Prova:</b> "Cercami eventi di trekking" • "Voglio conoscere nuove persone" • "Cosa c'è vicino a me?"
    </div>
    <div style="font-weight:700;font-size:14px;margin-bottom:10px">💡 Suggeriti per te</div>`;

  const suggested=events
    .filter(e=>userInterests.some(t=>e.category===t))
    .slice(0,3);

  suggested.forEach(e=>{
    html+=`
      <div class="ai-suggestion" onclick="navigate('eventDetail',${e.id})">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:28px">${e.emoji||'🎉'}</span>
          <div>
            <div style="font-weight:700;font-size:14px">${e.title}</div>
            <div style="font-size:12px;color:#888">${e.location||''}</div>
          </div>
          <div style="margin-left:auto;font-size:18px;color:#ddd">›</div>
        </div>
      </div>`;
  });

  if(!suggested.length){
    html+=`<div style="text-align:center;color:#aaa;padding:16px">Nessun evento trovato. <span style="color:#6c5ce7;cursor:pointer" onclick="navigate('search')">Esplora tutti gli eventi →</span></div>`;
  }

  html+=`
    <div class="ai-suggestion" onclick="navigate('matchPeople')" style="margin-top:4px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:28px">🤝</span>
        <div><div style="font-weight:700;font-size:14px">Persone compatibili</div>
        <div style="font-size:12px;color:#888">Trova persone con i tuoi interessi</div></div>
        <div style="margin-left:auto">›</div>
      </div>
    </div>
    <div class="chat-messages" id="aiChatMsgs" style="margin-top:16px;min-height:40px;max-height:240px"></div>
    <div class="chat-input-row">
      <input id="aiInput" placeholder="Scrivi cosa vorresti fare..."
             onkeypress="if(event.key==='Enter')sendAI()">
      <button class="send-btn" onclick="sendAI()">➤</button>
    </div>`;
  document.getElementById('content').innerHTML=html;
}

function sendAI(){
  const inp=document.getElementById('aiInput');
  if(!inp||!inp.value.trim())return;
  const text=inp.value.trim();
  inp.value='';
  const chat=document.getElementById('aiChatMsgs');

  // Msg utente
  const uWrap=document.createElement('div');
  uWrap.className='msg-wrap me';
  uWrap.innerHTML=`<div class="msg-bubble sent">${text}</div>`;
  chat.appendChild(uWrap);
  chat.scrollTop=chat.scrollHeight;

  // Typing
  const typing=document.createElement('div');
  typing.className='msg-wrap them';typing.id='aiTyping';
  typing.innerHTML=`<div class="msg-bubble received" style="padding:14px">
    <span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span>
  </div>`;
  chat.appendChild(typing);
  chat.scrollTop=chat.scrollHeight;

  setTimeout(()=>{
    document.getElementById('aiTyping')?.remove();
    const result=getAIReply(text);
    const aWrap=document.createElement('div');
    aWrap.className='msg-wrap them';
    aWrap.innerHTML=`<div class="msg-bubble received" style="background:#f0eeff">${result.reply}</div>`;
    chat.appendChild(aWrap);

    if(result.suggest){
      const ev=events.find(e=>e.category===result.suggest);
      if(ev){
        const card=document.createElement('div');
        card.className='ai-suggestion';card.style.marginTop='8px';
        card.onclick=()=>navigate('eventDetail',ev.id);
        card.innerHTML=`<div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:24px">${ev.emoji||'🎉'}</span>
          <div><div style="font-weight:700;font-size:13px">${ev.title}</div>
          <div style="font-size:12px;color:#888">${ev.location||''}</div></div>
          <div style="margin-left:auto">›</div></div>`;
        chat.appendChild(card);
      }
    }
    chat.scrollTop=chat.scrollHeight;
  },1000);
}

/* ================================================================
   MATCH PERSONE (da Supabase)
================================================================ */
async function drawMatchPeople(){
  showLoading();
  const {data:allProfiles}=await supabase
    .from('profiles').select('*').neq('id',currentUser?.id||'');

  // Per ogni profilo carica interessi
  const results=[];
  for(const u of (allProfiles||[]).slice(0,10)){
    if(blockedUsers.includes(u.id))continue;
    const {data:ui}=await supabase
      .from('user_interests').select('interests(name)').eq('user_id',u.id);
    const uInts=(ui||[]).map(x=>x.interests?.name).filter(Boolean);
    const common=userInterests.filter(i=>uInts.includes(i));
    const total=new Set([...userInterests,...uInts]).size;
    const pct=Math.min(95,Math.round((common.length/Math.max(total,1))*100+35));
    results.push({...u,commonInterests:common,pct});
  }
  results.sort((a,b)=>b.pct-a.pct);

  let html=`<div style="font-size:14px;color:#888;margin-bottom:16px">Basato sui tuoi interessi in comune</div>`;
  if(!results.length){
    html+=`<div style="text-align:center;color:#aaa;padding:40px">Nessun utente trovato ancora</div>`;
  }
  results.forEach(u=>{
    html+=`
      <div class="match-row">
        <div class="avatar">${u.emoji||'👤'}</div>
        <div style="flex:1">
          <div style="font-weight:700">${u.name} ${u.verified?'✅':''}</div>
          <div style="font-size:12px;color:#888">📍 ${u.city||''}</div>
          <div style="font-size:12px;color:#6c5ce7;margin:2px 0">
            ${u.commonInterests.length} interessi in comune: ${u.commonInterests.join(', ')||'nessuno'}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="compat-bar"><div class="compat-fill" style="width:${u.pct}%"></div></div>
          </div>
        </div>
        <div class="match-pct">${u.pct}%</div>
      </div>`;
  });
  document.getElementById('content').innerHTML=html;
}

/* ================================================================
   FEEDBACK
================================================================ */
function drawFeedback(eventId){
  selectedStars=0;thumbValue=null;repeatValue=null;
  const e=events.find(ev=>ev.id===eventId)||{title:'Evento'};
  document.getElementById('content').innerHTML=`
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:60px">🎉</div>
      <div style="font-size:20px;font-weight:800;margin-top:10px">Grazie per aver partecipato!</div>
      <div style="font-size:14px;color:#888;margin-top:6px">Com'è andata a <b>${e.title}</b>?</div>
    </div>
    <div style="font-size:15px;font-weight:700;text-align:center">Valuta la tua esperienza</div>
    <div class="stars">
      ${[1,2,3,4,5].map(s=>`<span class="star" onclick="setStar(${s})" id="star${s}">★</span>`).join('')}
    </div>
    <div style="font-size:14px;font-weight:700;margin-top:16px">Ti sei trovato bene con le persone?</div>
    <div style="display:flex;gap:16px;justify-content:center;margin:14px 0">
      <span style="font-size:40px;cursor:pointer" id="thumbUp" onclick="selectThumb(true)">👍</span>
      <span style="font-size:40px;cursor:pointer" id="thumbDown" onclick="selectThumb(false)">👎</span>
    </div>
    <div style="font-size:14px;font-weight:700">Rifarebbe l'esperienza insieme?</div>
    <div style="display:flex;gap:10px;margin:10px 0">
      <div class="btn sm secondary" id="repeatYes" onclick="setRepeat(true)">👍 Sì</div>
      <div class="btn sm secondary" id="repeatNo" onclick="setRepeat(false)">👎 No</div>
    </div>
    <label>Lascia un commento (opzionale)</label>
    <textarea id="feedbackComment" placeholder="Descrivi la tua esperienza..." rows="3"></textarea>
    <div class="btn" onclick="submitFeedback(${eventId})" style="margin-top:16px">📤 Invia feedback</div>`;
}

function setStar(n){
  selectedStars=n;
  document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<n));
}
function selectThumb(v){
  thumbValue=v;
  document.getElementById('thumbUp').style.opacity=v?1:.4;
  document.getElementById('thumbDown').style.opacity=v?.4:1;
}
function setRepeat(v){
  repeatValue=v;
  document.getElementById('repeatYes').className=`btn sm ${v?'':'secondary'}`;
  document.getElementById('repeatNo').className=`btn sm ${v?'secondary':''}`;
}

async function submitFeedback(eventId){
  if(!selectedStars){toast('⭐ Seleziona almeno una stella');return;}
  const comment=document.getElementById('feedbackComment').value;

  const {error}=await supabase.from('feedback').insert({
    event_id:eventId,
    from_user_id:currentUser.id,
    rating:selectedStars,
    comment,
    would_meet_again:repeatValue
  });
  if(error){toast('❌ '+error.message);return;}
  toast('✅ Feedback inviato! Grazie 🙏');
  setTimeout(()=>navigate('home'),1500);
}

/* ================================================================
   NOTIFICATIONS
================================================================ */
function drawNotifications(){
  const unread=notifications.filter(n=>!n.read).length;
  let html=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:14px;color:#888">${unread} non lette</div>
      <span class="section-link" onclick="markAllRead()">Segna tutte lette</span>
    </div>`;
  if(!notifications.length){
    html+=`<div style="text-align:center;color:#aaa;padding:40px">Nessuna notifica</div>`;
  }
  notifications.forEach(n=>{
    html+=`
      <div class="notif-item" onclick="markRead(${n.id})" style="cursor:pointer">
        <div class="notif-dot ${n.read?'read':''}"></div>
        <div style="font-size:24px">${n.icon}</div>
        <div style="flex:1">
          <div style="font-size:14px;${n.read?'color:#888':''}">${n.text}</div>
          <div style="font-size:12px;color:#aaa;margin-top:3px">${n.time}</div>
        </div>
      </div>`;
  });
  document.getElementById('content').innerHTML=html;
}

function markRead(id){notifications.find(n=>n.id===id)&&(notifications.find(n=>n.id===id).read=true);drawNotifications();}
function markAllRead(){notifications.forEach(n=>n.read=true);drawNotifications();}

/* ================================================================
   REPORT
================================================================ */
function drawReport(){
  const reasons=['Profilo falso','Comportamento inappropriato','Molestie','Spam','Mancata presenza all\'evento','Contenuto inappropriato'];
  let html=`
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:48px">🚩</div>
      <div style="font-weight:800;font-size:18px;margin-top:8px">Segnala</div>
      <div style="font-size:13px;color:#888;margin-top:4px">Aiutaci a mantenere la community sicura</div>
    </div>
    <div style="font-weight:700;margin-bottom:10px">Motivo</div>`;
  reasons.forEach(r=>{
    html+=`<div class="report-option ${reportSelected===r?'selected':''}" onclick="selectReason('${r}',this)">${r}</div>`;
  });
  html+=`
    <label>Descrizione (opzionale)</label>
    <textarea id="reportDesc" placeholder="Descrivi la situazione..." rows="3"></textarea>
    <div class="btn danger" onclick="submitReport()" style="margin-top:16px">🚩 Invia segnalazione</div>
    <div class="btn secondary" onclick="goBack()" style="margin-top:8px">Annulla</div>`;
  document.getElementById('content').innerHTML=html;
}

function selectReason(r,el){
  reportSelected=r;
  document.querySelectorAll('.report-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
}

async function submitReport(){
  if(!reportSelected){toast('⚠️ Seleziona un motivo');return;}
  const desc=document.getElementById('reportDesc').value;
  const {error}=await supabase.from('reports').insert({
    reporter_id:currentUser?.id||null,
    reason:reportSelected,
    description:desc,
    event_id:currentEventId||null
  });
  if(error){toast('❌ '+error.message);return;}
  reportSelected='';
  toast('✅ Segnalazione inviata. Grazie!');
  goBack();
}

/* ================================================================
   ADMIN DASHBOARD
================================================================ */
async function drawAdmin(){
  showLoading();
  const [{count:userCount},{count:evCount},{data:reps}]=await Promise.all([
    supabase.from('profiles').select('*',{count:'exact',head:true}),
    supabase.from('events').select('*',{count:'exact',head:true}),
    supabase.from('reports').select('*').eq('status','pending')
  ]);

  let html=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${userCount||0}</div><div class="stat-label">Utenti</div></div>
      <div class="stat-card"><div class="stat-num">${evCount||0}</div><div class="stat-label">Eventi</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#ff4757">${reps?.length||0}</div><div class="stat-label">Segnalazioni</div></div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="adminTab('reports',this)">🚩 Segnalazioni</div>
      <div class="tab" onclick="adminTab('users',this)">👥 Utenti</div>
      <div class="tab" onclick="adminTab('events',this)">📅 Eventi</div>
    </div>
    <div id="adminTabContent">`;

  if(!reps||!reps.length){
    html+=`<div style="text-align:center;color:#aaa;padding:30px">✅ Nessuna segnalazione pendente</div>`;
  } else {
    reps.forEach(r=>{
      html+=`
        <div class="card">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <div>
              <div style="font-weight:700">${r.reason}</div>
              <div style="font-size:12px;color:#aaa">${new Date(r.created_at).toLocaleDateString('it-IT')}</div>
            </div>
            <span class="badge red">pending</span>
          </div>
          ${r.description?`<div style="font-size:13px;color:#666;margin-bottom:8px">${r.description}</div>`:''}
          <div style="display:flex;gap:8px">
            <div class="btn sm danger" onclick="adminResolve(${r.id},'resolved')">✅ Risolvi</div>
            <div class="btn sm secondary" onclick="adminResolve(${r.id},'dismissed')">Ignora</div>
          </div>
        </div>`;
    });
  }
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}

async function adminTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const container=document.getElementById('adminTabContent');
  container.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;

  if(tab==='reports'){
    const {data}=await supabase.from('reports').select('*').order('created_at',{ascending:false}).limit(20);
    let html='';
    (data||[]).forEach(r=>{
      html+=`
        <div class="card">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <div><div style="font-weight:700">${r.reason}</div>
            <div style="font-size:12px;color:#aaa">${new Date(r.created_at).toLocaleDateString('it-IT')}</div></div>
            <span class="badge ${r.status==='pending'?'red':'green'}">${r.status}</span>
          </div>
          ${r.status==='pending'?`
            <div style="display:flex;gap:8px">
              <div class="btn sm danger" onclick="adminResolve(${r.id},'resolved')">✅ Risolvi</div>
              <div class="btn sm secondary" onclick="adminResolve(${r.id},'dismissed')">Ignora</div>
            </div>`:''}
        </div>`;
    });
    container.innerHTML=html||'<div style="text-align:center;color:#aaa;padding:30px">Nessuna segnalazione</div>';
  } else if(tab==='users'){
    const {data}=await supabase.from('profiles').select('*').order('created_at',{ascending:false}).limit(20);
    let html='';
    (data||[]).forEach(u=>{
      html+=`
        <div class="card">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="avatar">${u.emoji||'👤'}</div>
            <div style="flex:1">
              <div style="font-weight:700">${u.name||'Utente'} ${u.verified?'✅':''}</div>
              <div style="font-size:12px;color:#888">📍 ${u.city||''}</div>
            </div>
            <div class="btn sm danger" onclick="toast('Funzione disponibile presto')">🚫</div>
          </div>
        </div>`;
    });
    container.innerHTML=html||'<div style="text-align:center;color:#aaa;padding:30px">Nessun utente</div>';
  } else if(tab==='events'){
    const {data}=await supabase.from('events').select('*').order('created_at',{ascending:false}).limit(20);
    let html='';
    (data||[]).forEach(e=>{
      html+=`
        <div class="card">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:28px">${e.emoji||'🎉'}</span>
            <div style="flex:1">
              <div style="font-weight:700">${e.title}</div>
              <div style="font-size:12px;color:#888">${e.location||''} • <span class="badge ${e.status==='active'?'green':'red'}">${e.status}</span></div>
            </div>
            <div class="btn sm danger" onclick="adminRemoveEvent(${e.id})">🗑️</div>
          </div>
        </div>`;
    });
    container.innerHTML=html||'<div style="text-align:center;color:#aaa;padding:30px">Nessun evento</div>';
  }
}

async function adminResolve(id,status){
  await supabase.from('reports').update({status}).eq('id',id);
  toast(status==='resolved'?'✅ Risolto':'🗑️ Ignorato');
  drawAdmin();
}

async function adminRemoveEvent(id){
  await supabase.from('events').update({status:'removed'}).eq('id',id);
  toast('🗑️ Evento rimosso');
  await loadEvents();
  drawAdmin();
}
