<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventConnect – Condividi Esperienze</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- SPLASH -->
  <div class="splash" id="splash">
    <div>
      <div class="splash-logo">🎉</div>
      <div class="splash-title">EventConnect</div>
      <div class="splash-sub">Condividi Esperienze,<br>Crea Connessioni</div>
    </div>
    <div class="splash-pills">
      <div class="splash-pill">🛡️ Sicuro e verificato</div>
      <div class="splash-pill">🤝 Matching intelligente</div>
      <div class="splash-pill">📍 Vicino a te</div>
      <div class="splash-pill">🤖 AI Assistant</div>
    </div>
    <div class="splash-btns">
      <button id="btnRegister" class="splash-btn-primary">🚀 Registrati – è gratis</button>
      <button id="btnLogin" class="splash-btn-secondary">Accedi</button>
      <button id="btnAdmin" class="splash-btn-ghost">🔐 Demo Admin</button>
      <div class="splash-footer">Vivi di più. Insieme. 🌟</div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div class="app" id="appShell">
    <div class="header" id="appHeader">
      <div class="header-left">
        <span class="back-btn" id="backBtn" onclick="goBack()">‹</span>
        <span class="header-logo" id="headerLogo">🎉 EventConnect</span>
        <span class="header-title hidden" id="headerTitle"></span>
      </div>
      <div class="header-right" id="headerRight"></div>
    </div>
    <div class="app-body">
      <div class="content" id="content"></div>
    </div>
    <div class="navbar" id="navbar" style="display:none;"></div>
  </div>

  <!-- JS: ordine importante, config e state prima di tutto -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/home.js"></script>
  <script src="js/search.js"></script>
  <script src="js/events.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/match.js"></script>
  <script src="js/misc.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
