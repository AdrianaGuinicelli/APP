<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;overflow:hidden;}

.header{padding:14px 16px;background:#fff;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;position:relative;z-index:50;min-height:54px;}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{font-size:26px;cursor:pointer;color:#6c5ce7;display:none;line-height:1;}
.header-title{font-weight:700;font-size:17px;}
.header-logo{font-size:17px;font-weight:800;background:linear-gradient(90deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-icon{font-size:22px;cursor:pointer;position:relative;}
.badge-dot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:#ff4757;border:2px solid #fff;}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:85px;-webkit-overflow-scrolling:touch;}

.btn{background:linear-gradient(90deg,#6c5ce7,#8e7dff);color:#fff;padding:13px;text-align:center;border-radius:14px;margin-top:10px;cursor:pointer;font-weight:700;font-size:15px;border:none;width:100%;display:block;transition:opacity .2s;}

.btn.secondary{background:#f0f0f5;color:#6c5ce7;}

.card-title{font-weight:700;font-size:16px;margin-bottom:4px;}
.card-meta{font-size:13px;color:#666;display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.card-tag{display:inline-block;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:6px;margin-right:4px;}
.tag-musica{background:#f0eeff;color:#6c5ce7;}

.tag-sport{background:#e8f8f5;color:#00897b;}

.tag-food{background:#fff3e0;color:#e65100;}
.tag-cinema{background:#e3f2fd;color:#1565c0;}
.tag-teatro{background:#f3e5f5;color:#7b1fa2;}
.tag-viaggi{background:#e0f7fa;color:#00838f;}

input,textarea,select{width:100%;padding:12px 14px;margin-top:8px;border-radius:12px;border:1.5px solid #e0e0e0;font-size:14px;outline:none;transition:border-color .2s;background:#fafafa;font-family:inherit;color:#222;}
input:focus,textarea:focus,select:focus{border-color:#6c5ce7;background:#fff;}

.progress-bar{height:6px;background:#eee;border-radius:3px;margin-top:6px;}

.verified-badge{display:inline-flex;align-items:center;gap:4px;background:#e8f8f5;color:#00897b;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(50,50,50,.92);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;white-space:nowrap;pointer-events:none;animation:fadeInOut 2.8s forwards;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:#888;}
.spinner{width:36px;height:36px;border:3px solid #f0eeff;border-top:3px solid #6c5ce7;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none!important;}

<script>
/* ── SUPABASE ── */
const SUPABASE_URL = 'https://sqevigimxneucauwljov.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxZXZpZ2lteG5ldWNhdXdsam92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDAyNjQsImV4cCI6MjA5NzM3NjI2NH0.0Eo-hIYVFYQJjyGh3viUTeymInTyqw6Ef7BF54uJOXU';

if (!window._supabaseClient) {
  window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ✅ Usa var invece di const — var non dà errore se dichiarata più volte
var supabase = window._supabaseClient;

/* ── STATE ── */
let currentUser=null,isLoggedIn=false,isAdmin=false;
let navHistory=[],currentPage='',currentEventId=null;
let selectedStars=0,reportSelected='',userInterests=[];
let userLocation=null,activeFilters={category:'',maxDistance:200};
let savedEvents=[],blockedUsers=[],activeTab='chat';
let events=[],selectedEmoji='🎉',thumbValue=null,repeatValue=null;
let notifications=[{id:1,text:'Benvenuto su EventConnect! 🎉',time:'ora',read:false,icon:'🎉'}];

const allInterests=[
  {icon:'🎵',label:'Musica'},{icon:'🎨',label:'Arte'},{icon:'⚽',label:'Sport'},
  {icon:'🥾',label:'Trekking'},{icon:'🎬',label:'Cinema'},{icon:'🍕',label:'Cibo'},
  {icon:'✈️',label:'Viaggi'},{icon:'💻',label:'Tecnologia'},{icon:'🎭',label:'Teatro'},
  {icon:'📚',label:'Libri'},{icon:'🧘',label:'Benessere'},{icon:'🎉',label:'Altro'}
];

/* ── SPLASH ENTRY POINT ── */
function splashGo(dest){
  document.getElementById('splash').style.display='none';
  document.getElementById('appShell').style.display='flex';
  if(dest==='admin'){adminLogin();}
  else{navigate(dest);}
}

/* ── INIT ── */
window.onload=async function(){
  requestGeo();
  try{
    const {data:{session}}=await supabase.auth.getSession();
    if(session){
      const {data:profile}=await supabase.from('profiles').select('*').eq('id',session.user.id).single();
      if(profile){
        currentUser={...profile,id:session.user.id};
        isLoggedIn=true;
        const {data:ui}=await supabase.from('user_interests').select('interests(name)').eq('user_id',session.user.id);
        userInterests=(ui||[]).map(x=>x.interests?.name).filter(Boolean);
        currentUser.interests=userInterests;
        await loadEvents();
        // Già loggato: salta splash e vai a home
        document.getElementById('splash').style.display='none';
        document.getElementById('appShell').style.display='flex';
        navigate('home');
      }
    }
  }catch(e){console.log('No session',e);}
};

/* ── GEO ── */
function haversine(a,b,c,d){const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))).toFixed(1);}
function distLabel(ev){if(!userLocation||!ev.latitude)return null;const k=parseFloat(haversine(userLocation.lat,userLocation.lng,ev.latitude,ev.longitude));return k<1?'< 1 km':k+' km';}
async function requestGeo(){return new Promise(r=>{if(!navigator.geolocation)return r(null);navigator.geolocation.getCurrentPosition(p=>{userLocation={lat:p.coords.latitude,lng:p.coords.longitude};r(userLocation);},()=>r(null),{timeout:6000});});}

/* ── NOMINATIM ── */
let geoT=null;
function setupGeoAutocomplete(iId,lId,cb){
  const inp=document.getElementById(iId),lst=document.getElementById(lId);
  if(!inp||!lst)return;
  inp.addEventListener('input',()=>{
    clearTimeout(geoT);
    const q=inp.value.trim();
    if(q.length<3){lst.style.display='none';return;}
    geoT=setTimeout(async()=>{
      try{
        const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q)+'&limit=5&accept-language=it');
        const data=await r.json();
        if(!data.length){lst.style.display='none';return;}
        lst.innerHTML='';lst.style.display='block';
        data.forEach(item=>{
          const d=document.createElement('div');
          d.className='autocomplete-item';d.textContent=item.display_name;
          d.onclick=()=>{inp.value=item.display_name;lst.style.display='none';if(cb)cb(item);};
          lst.appendChild(d);
        });
      }catch(e){lst.style.display='none';}
    },400);
  });
  document.addEventListener('click',e=>{if(!inp.contains(e.target))lst.style.display='none';});
}

function updateShell(page){
  const noNavPages=['login','register','onboarding'];
  document.getElementById('navbar').style.display=noNavPages.includes(page)?'none':'flex';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nm={home:'nav-home',search:'nav-search',create:'nav-create',chatList:'nav-chatList',profile:'nav-profile'};
  if(nm[page])document.getElementById(nm[page])?.classList.add('active');
  const logo=document.getElementById('headerLogo');
  const title=document.getElementById('headerTitle');
  const back=document.getElementById('backBtn');
  const hr=document.getElementById('headerRight');
  const noBack=['home','search','create','chatList','profile','login','register','onboarding'];
  back.style.display=noBack.includes(page)?'none':'block';

function setCatFilter(cat,el){activeFilters.category=cat;document.querySelectorAll('#catFilters .filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');filterEvents();}
function onDistSlider(val){activeFilters.maxDistance=parseInt(val);const el=document.getElementById('distVal');if(el)el.textContent=val>=200?'Tutte':val+' km';filterEvents();}
function enableGeo(){navigator.geolocation.getCurrentPosition(p=>{userLocation={lat:p.coords.latitude,lng:p.coords.longitude};drawSearch();},()=>toast('❌ Posizione non disponibile'));}

function filterEvents(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const city=(document.getElementById('citySearchInput')?.value||'').toLowerCase();
  const sort=document.getElementById('sortSel')?.value||'default';
  let filtered=events.filter(e=>{
    const mQ=!q||e.title.toLowerCase().includes(q)||(e.category||'').toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q);
    const mC=!city||(e.location||'').toLowerCase().includes(city);
    const mCat=!activeFilters.category||e.category===activeFilters.category;
    let mD=true;
    if(userLocation&&e.latitude&&activeFilters.maxDistance<200)mD=parseFloat(haversine(userLocation.lat,userLocation.lng,e.latitude,e.longitude))<=activeFilters.maxDistance;
    return mQ&&mC&&mCat&&mD;
  });
  if(sort==='distance'&&userLocation)filtered.sort((a,b)=>parseFloat(haversine(userLocation.lat,userLocation.lng,a.latitude,a.longitude))-parseFloat(haversine(userLocation.lat,userLocation.lng,b.latitude,b.longitude)));
  else if(sort==='price')filtered.sort((a,b)=>a.price-b.price);
  let html='';
  if(!filtered.length)html='<div style="text-align:center;color:#aaa;padding:40px">Nessun evento trovato</div>';
  filtered.forEach(e=>{
    const dl=distLabel(e);
    html+='<div class="card" style="cursor:pointer" onclick="navigate(\'eventDetail\','+e.id+')"><div style="display:flex;gap:12px;align-items:flex-start"><div style="font-size:40px">'+(e.emoji||'🎉')+'</div><div style="flex:1"><span class="card-tag tag-'+(e.category||'altro').toLowerCase()+'">'+(e.category||'Altro')+'</span><div class="card-title">'+e.title+'</div><div class="card-meta">📍 '+(e.location||'')+(dl?' <span style="background:#f0eeff;color:#6c5ce7;border-radius:8px;padding:1px 6px;font-size:11px;font-weight:700">📍'+dl+'</span>':'')+'</div>'+(e.price===0?'<div class="card-meta" style="color:#00b894">✅ Gratuito</div>':'<div class="card-meta" style="color:#e67e22">💰 €'+e.price+'</div>')+'</div></div></div>';
  });
  document.getElementById('searchResults').innerHTML=html;
}

  let isMine=false;
  if(currentUser?.id&&currentUser.id!=='admin'){
    const {data:mp}=await supabase.from('event_participants').select('user_id').eq('event_id',eventId).eq('user_id',currentUser.id).single();
    isMine=!!mp;
  }
  const dl=distLabel(e);
  const isSaved=savedEvents.includes(e.id);
  let html='<div class="detail-hero">'+(e.emoji||'🎉')+'</div>';
  html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px"><div><span class="card-tag tag-'+(e.category||'altro').toLowerCase()+'">'+(e.category||'Altro')+'</span><div class="card-title" style="font-size:20px">'+e.title+'</div></div><span style="font-size:24px;cursor:pointer" onclick="shareEvent('+e.id+')">⬆️</span></div>';
  html+='<div class="detail-row"><span class="icon">📍</span><div>'+(e.location||'')+(e.address?'<br><span style="color:#888;font-size:13px">'+e.address+'</span>':'')+(dl?'<br><span style="color:#6c5ce7;font-size:12px;font-weight:700">📍 '+dl+' da te</span>':'')+'</div></div>';
  if(e.date_time)html+='<div class="detail-row"><span class="icon">📅</span>'+new Date(e.date_time).toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})+'</div>';
  html+='<div class="detail-row"><span class="icon">📝</span><div style="color:#555;line-height:1.5">'+(e.description||'Nessuna descrizione')+'</div></div>';
  html+='<div class="detail-row"><span class="icon">👥</span>'+(pCount||0)+'/'+e.max_participants+' partecipanti</div>';
  html+=e.price===0?'<div class="detail-row"><span class="icon">✅</span><div style="color:#00b894;font-weight:600">Gratuito</div></div>':'<div class="detail-row"><span class="icon">💰</span>€'+e.price+' a persona</div>';
  if(e.external_link)html+='<div class="detail-row"><span class="icon">🔗</span><a href="'+e.external_link+'" target="_blank" style="color:#6c5ce7">Sito esterno</a></div>';
  if(isMine){
    html+='<div class="btn green" onclick="navigate(\'eventGroup\','+e.id+')">💬 Vai al Gruppo Chat</div>';
    html+='<div class="btn secondary" onclick="leaveEvent('+e.id+')">Abbandona evento</div>';
    html+='<div class="btn outline" onclick="navigate(\'feedback\','+e.id+')" style="margin-top:8px">⭐ Lascia feedback</div>';
  } else {
    const full=(pCount||0)>=e.max_participants;
    html+='<div class="btn '+(full?'secondary':'')+'" onclick="'+(full?'toast(\'⚠️ Evento al completo!\')':'joinEvent('+e.id+')')+'">'+( full?'🔒 Evento completo':'Partecipa')+'</div>';
    html+='<div class="btn secondary" onclick="toggleSave('+e.id+')" style="margin-top:8px">🔖 '+(isSaved?'Salvato ✓':'Mi interessa')+'</div>';
  }
  html+='<div style="margin-top:16px;text-align:center"><span style="color:#ff4757;font-size:13px;cursor:pointer" onclick="navigate(\'report\','+e.id+')">🚩 Segnala evento</span></div>';
  document.getElementById('content').innerHTML=html;
}

async function joinEvent(id){
  if(!isLoggedIn){toast('⚠️ Devi essere loggato');navigate('login');return;}
  const {error}=await supabase.from('event_participants').insert({event_id:id,user_id:currentUser.id});
  if(error){toast('❌ '+error.message);return;}
  toast('✅ Hai aderito!');
  notifications.unshift({id:Date.now(),text:'Hai aderito a un evento!',time:'ora',read:false,icon:'✅'});
  drawEventDetail(id);
}
async function leaveEvent(id){
  const {error}=await supabase.from('event_participants').delete().eq('event_id',id).eq('user_id',currentUser.id);
  if(error){toast('❌ '+error.message);return;}
  toast('👋 Hai abbandonato l\'evento');navigate('home');
}
function shareEvent(id){
  const e=events.find(ev=>ev.id===id);
  if(navigator.share)navigator.share({title:e?.title||'EventConnect',text:'Vieni a questo evento!',url:window.location.href});
  else{navigator.clipboard?.writeText(window.location.href);toast('🔗 Link copiato!');}
}

async function submitCreate(){
  const title=document.getElementById('cTitle').value.trim();
  const desc=document.getElementById('cDesc').value.trim();
  const cat=document.getElementById('cCat').value;
  const dateRaw=document.getElementById('cDate').value;
  const city=document.getElementById('cCity').value.trim();
  const addr=document.getElementById('cAddr').value.trim();
  const maxP=parseInt(document.getElementById('cMax').value)||10;
  const price=parseFloat(document.getElementById('cPrice').value)||0;
  const link=document.getElementById('cLink').value.trim();
  const lat=parseFloat(document.getElementById('cLat').textContent)||null;
  const lng=parseFloat(document.getElementById('cLng').textContent)||null;
  if(!title){toast('⚠️ Inserisci il titolo');return;}
  if(!cat){toast('⚠️ Seleziona la categoria');return;}
  if(!dateRaw){toast('⚠️ Inserisci data e ora');return;}
  if(!city){toast('⚠️ Inserisci la città');return;}
  if(!addr){toast('⚠️ Inserisci l\'indirizzo');return;}
  if(maxP<2){toast('⚠️ Min 2 partecipanti');return;}
  toast('⏳ Creazione...');
  const {data,error}=await supabase.from('events').insert({creator_id:currentUser.id,title,description:desc,category:cat,date_time:new Date(dateRaw).toISOString(),location:city,address:addr,max_participants:maxP,price,emoji:selectedEmoji,latitude:lat,longitude:lng,external_link:link||null,status:'active'}).select().single();
  if(error){toast('❌ '+error.message);return;}
  await supabase.from('event_participants').insert({event_id:data.id,user_id:currentUser.id});
  await loadEvents();
  notifications.unshift({id:Date.now(),text:'Hai creato "'+title+'"',time:'ora',read:false,icon:'🎉'});
  toast('✅ Evento creato!');
  navigate('eventDetail',data.id);
}

/* ── EVENT GROUP ── */
async function drawEventGroup(eventId){
  const {data:e}=await supabase.from('events').select('*').eq('id',eventId).single();
  if(!e)return;
  document.getElementById('headerTitle').textContent=e.title;
  let html='<div style="background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px"><div style="font-size:28px">'+(e.emoji||'🎉')+'</div><div><div style="font-weight:700">'+e.title+'</div><div style="font-size:12px;color:#888">'+(e.location||'')+'</div></div></div>';
  html+='<div class="tabs"><div class="tab '+(activeTab==='chat'?'active':'')+'" onclick="switchTab(\'chat\','+e.id+')">💬 Chat</div><div class="tab '+(activeTab==='participants'?'active':'')+'" onclick="switchTab(\'participants\','+e.id+')">👥 Partecipanti</div><div class="tab '+(activeTab==='details'?'active':'')+'" onclick="switchTab(\'details\','+e.id+')">ℹ️ Dettagli</div></div>';
  html+='<div id="groupTabContent">';
  if(activeTab==='chat')html+=await renderChat(e);
  else if(activeTab==='participants')html+=await renderParticipants(e);
  else html+=renderEventDetails(e);
  html+='</div>';
  document.getElementById('content').innerHTML=html;
  if(activeTab==='chat'){setTimeout(()=>{const c=document.getElementById('chatMsgs');if(c)c.scrollTop=c.scrollHeight;},50);}
}

function switchTab(tab,eventId){activeTab=tab;drawEventGroup(eventId);}

async function renderChat(e){
  const {data:msgs}=await supabase.from('messages').select('*,profiles(name,emoji)').eq('event_id',e.id).order('created_at',{ascending:true});
  let html='<div class="chat-messages" id="chatMsgs">';
  if(!msgs||!msgs.length)html+='<div style="text-align:center;color:#aaa;padding:20px">Nessun messaggio. Inizia! 👋</div>';
  (msgs||[]).forEach(m=>{
    const isMine=m.sender_id===currentUser?.id;
    const time=new Date(m.created_at).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    html+='<div class="msg-wrap '+(isMine?'me':'them')+'">'+(!isMine?'<div class="msg-sender">'+(m.profiles?.name||'Utente')+'</div>':'')+'<div class="msg-bubble '+(isMine?'sent':'received')+'">'+m.message+'</div><div class="msg-time">'+time+'</div></div>';
  });
  html+='</div><div class="chat-input-row"><input id="msgInput" placeholder="Scrivi un messaggio..." onkeypress="if(event.key===\'Enter\')sendMessage('+e.id+')"><button class="send-btn" onclick="sendMessage('+e.id+')">➤</button></div>';
  return html;
}

async function sendMessage(eventId){
  const inp=document.getElementById('msgInput');
  if(!inp||!inp.value.trim())return;
  if(!isLoggedIn){toast('⚠️ Devi essere loggato');return;}
  const {error}=await supabase.from('messages').insert({event_id:eventId,sender_id:currentUser.id,message:inp.value.trim()});
  if(error){toast('❌ '+error.message);return;}
  inp.value='';
  await drawEventGroup(eventId);
}

function toggleProfileInterest(label,el){el.classList.toggle('selected');if(el.classList.contains('selected')){if(!userInterests.includes(label))userInterests.push(label);}else{userInterests=userInterests.filter(i=>i!==label);}}

async function saveProfile(){
  const bio=document.getElementById('editBio').value;
  const city=document.getElementById('editCity').value;
  const {error}=await supabase.from('profiles').update({bio,city,completeness:Math.min(100,(currentUser.completeness||40)+15)}).eq('id',currentUser.id);
  if(error){toast('❌ '+error.message);return;}
  await supabase.from('user_interests').delete().eq('user_id',currentUser.id);
  const {data:iRows}=await supabase.from('interests').select('id,name').in('name',userInterests);
  if(iRows?.length)await supabase.from('user_interests').insert(iRows.map(i=>({user_id:currentUser.id,interest_id:i.id})));
  currentUser.bio=bio;currentUser.city=city;currentUser.interests=userInterests;
  toast('✅ Profilo aggiornato!');drawProfile();
}

}

function sendAI(){
  const inp=document.getElementById('aiInput');
  if(!inp||!inp.value.trim())return;
  const text=inp.value.trim();inp.value='';
  const chat=document.getElementById('aiChatMsgs');
  const uW=document.createElement('div');uW.className='msg-wrap me';uW.innerHTML='<div class="msg-bubble sent">'+text+'</div>';chat.appendChild(uW);
  const ty=document.createElement('div');ty.className='msg-wrap them';ty.id='aiTyping';ty.innerHTML='<div class="msg-bubble received" style="padding:14px"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span></div>';chat.appendChild(ty);chat.scrollTop=chat.scrollHeight;
  setTimeout(()=>{
    document.getElementById('aiTyping')?.remove();
    const r=getAIReply(text);
    const aW=document.createElement('div');aW.className='msg-wrap them';aW.innerHTML='<div class="msg-bubble received" style="background:#f0eeff">'+r.reply+'</div>';chat.appendChild(aW);
    if(r.suggest){const ev=events.find(e=>e.category===r.suggest);if(ev){const c=document.createElement('div');c.className='ai-suggestion';c.style.marginTop='8px';c.onclick=()=>navigate('eventDetail',ev.id);c.innerHTML='<div style="display:flex;align-items:center;gap:10px"><span style="font-size:24px">'+(ev.emoji||'🎉')+'</span><div><div style="font-weight:700;font-size:13px">'+ev.title+'</div><div style="font-size:12px;color:#888">'+(ev.location||'')+'</div></div><div style="margin-left:auto">›</div></div>';chat.appendChild(c);}}
    chat.scrollTop=chat.scrollHeight;
  },1000);
}

/* ── MATCH PERSONE ── */
async function drawMatchPeople(){
  showLoading();
  const {data:profiles}=await supabase.from('profiles').select('*').neq('id',currentUser?.id||'');
  const results=[];
  for(const u of (profiles||[]).slice(0,10)){
    if(blockedUsers.includes(u.id))continue;
    const {data:ui}=await supabase.from('user_interests').select('interests(name)').eq('user_id',u.id);
    const uI=(ui||[]).map(x=>x.interests?.name).filter(Boolean);
    const common=userInterests.filter(i=>uI.includes(i));
    const total=new Set([...userInterests,...uI]).size;
    const pct=Math.min(95,Math.round((common.length/Math.max(total,1))*100+35));
    results.push({...u,commonInterests:common,pct});
  }
  results.sort((a,b)=>b.pct-a.pct);
  let html='<div style="font-size:14px;color:#888;margin-bottom:16px">Basato sui tuoi interessi in comune</div>';
  if(!results.length)html+='<div style="text-align:center;color:#aaa;padding:40px">Nessun utente trovato ancora</div>';
  results.forEach(u=>{html+='<div class="match-row"><div class="avatar">'+(u.emoji||'👤')+'</div><div style="flex:1"><div style="font-weight:700">'+u.name+(u.verified?' ✅':'')+'</div><div style="font-size:12px;color:#888">📍 '+(u.city||'')+'</div><div style="font-size:12px;color:#6c5ce7;margin:2px 0">'+u.commonInterests.length+' interessi in comune: '+(u.commonInterests.join(', ')||'nessuno')+'</div><div class="compat-bar"><div class="compat-fill" style="width:'+u.pct+'%"></div></div></div><div class="match-pct">'+u.pct+'%</div></div>';});
  document.getElementById('content').innerHTML=html;
}

/* ── FEEDBACK ── */
function drawFeedback(eventId){
  selectedStars=0;thumbValue=null;repeatValue=null;
  const e=events.find(ev=>ev.id===eventId)||{title:'Evento'};
  document.getElementById('content').innerHTML=`
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:60px">🎉</div>
      <div style="font-size:20px;font-weight:800;margin-top:10px">Grazie per aver partecipato!</div>
      <div style="font-size:14px;color:#888;margin-top:6px">Com'è andata a <b>${e.title}</b>?</div>
    </div>
    <div style="font-size:15px;font-weight:700;text-align:center">Valuta la tua esperienza</div>
    <div class="stars">${[1,2,3,4,5].map(s=>'<span class="star" onclick="setStar('+s+')" id="star'+s+'">★</span>').join('')}</div>
    <div style="font-size:14px;font-weight:700;margin-top:16px">Ti sei trovato bene con le persone?</div>
    <div style="display:flex;gap:16px;justify-content:center;margin:14px 0">
      <span style="font-size:40px;cursor:pointer" id="thumbUp" onclick="selectThumb(true)">👍</span>
      <span style="font-size:40px;cursor:pointer" id="thumbDown" onclick="selectThumb(false)">👎</span>
    </div>
    <div style="font-size:14px;font-weight:700">Rifarebbe l'esperienza insieme?</div>
    <div style="display:flex;gap:10px;margin:10px 0">
      <div class="btn sm secondary" id="repeatYes" onclick="setRepeat(true)">👍 Sì</div>
      <div class="btn sm secondary" id="repeatNo" onclick="setRepeat(false)">👎 No</div>
    </div>
    <label>Commento (opzionale)</label>
    <textarea id="feedbackComment" placeholder="Descrivi la tua esperienza..." rows="3"></textarea>
    <div class="btn" onclick="submitFeedback(${eventId})" style="margin-top:16px">📤 Invia feedback</div>`;
}

function setStar(n){selectedStars=n;document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<n));}
function selectThumb(v){thumbValue=v;document.getElementById('thumbUp').style.opacity=v?1:.4;document.getElementById('thumbDown').style.opacity=v?.4:1;}
function setRepeat(v){repeatValue=v;document.getElementById('repeatYes').className='btn sm '+(v?'':'secondary');document.getElementById('repeatNo').className='btn sm '+(v?'secondary':'');}

async function submitFeedback(eventId){
  if(!selectedStars){toast('⭐ Seleziona almeno una stella');return;}
  const {error}=await supabase.from('feedback').insert({event_id:eventId,from_user_id:currentUser.id,rating:selectedStars,comment:document.getElementById('feedbackComment').value,would_meet_again:repeatValue});
  if(error){toast('❌ '+error.message);return;}
  toast('✅ Feedback inviato! Grazie 🙏');
  setTimeout(()=>navigate('home'),1500);
}

/* ── NOTIFICATIONS ── */
function drawNotifications(){
  const unread=notifications.filter(n=>!n.read).length;
  let html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:14px;color:#888">'+unread+' non lette</div><span class="section-link" onclick="markAllRead()">Segna tutte lette</span></div>';
  if(!notifications.length)html+='<div style="text-align:center;color:#aaa;padding:40px">Nessuna notifica</div>';
  notifications.forEach(n=>{html+='<div class="notif-item" onclick="markRead('+n.id+')" style="cursor:pointer"><div class="notif-dot '+(n.read?'read':'')+'"></div><div style="font-size:24px">'+n.icon+'</div><div style="flex:1"><div style="font-size:14px;'+(n.read?'color:#888':'')+'">'+n.text+'</div><div style="font-size:12px;color:#aaa;margin-top:3px">'+n.time+'</div></div></div>';});
  document.getElementById('content').innerHTML=html;
}
function markRead(id){const n=notifications.find(x=>x.id===id);if(n)n.read=true;drawNotifications();}
function markAllRead(){notifications.forEach(n=>n.read=true);drawNotifications();}

/* ── REPORT ── */
function drawReport(){
  const reasons=['Profilo falso','Comportamento inappropriato','Molestie','Spam','Mancata presenza','Contenuto inappropriato'];
  let html='<div style="text-align:center;margin-bottom:20px"><div style="font-size:48px">🚩</div><div style="font-weight:800;font-size:18px;margin-top:8px">Segnala</div><div style="font-size:13px;color:#888;margin-top:4px">Aiutaci a mantenere la community sicura</div></div><div style="font-weight:700;margin-bottom:10px">Motivo</div>';
  reasons.forEach(r=>{html+='<div class="report-option '+(reportSelected===r?'selected':'')+'" onclick="selectReason(\''+r+'\',this)">'+r+'</div>';});
  html+='<label>Descrizione (opzionale)</label><textarea id="reportDesc" placeholder="Descrivi..." rows="3"></textarea><div class="btn danger" onclick="submitReport()" style="margin-top:16px">🚩 Invia segnalazione</div><div class="btn secondary" onclick="goBack()" style="margin-top:8px">Annulla</div>';
  document.getElementById('content').innerHTML=html;
}
function selectReason(r,el){reportSelected=r;document.querySelectorAll('.report-option').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');}
async function submitReport(){
  if(!reportSelected){toast('⚠️ Seleziona un motivo');return;}
  const {error}=await supabase.from('reports').insert({reporter_id:currentUser?.id||null,reason:reportSelected,description:document.getElementById('reportDesc').value,event_id:currentEventId||null});
  if(error){toast('❌ '+error.message);return;}
  reportSelected='';toast('✅ Segnalazione inviata!');goBack();
}

/* ── ADMIN ── */
async function drawAdmin(){
  showLoading();
  const [{count:uC},{count:eC},{data:reps}]=await Promise.all([
    supabase.from('profiles').select('*',{count:'exact',head:true}),
    supabase.from('events').select('*',{count:'exact',head:true}),
    supabase.from('reports').select('*').eq('status','pending')
  ]);
  let html='<div class="stat-grid"><div class="stat-card"><div class="stat-num">'+(uC||0)+'</div><div class="stat-label">Utenti</div></div><div class="stat-card"><div class="stat-num">'+(eC||0)+'</div><div class="stat-label">Eventi</div></div><div class="stat-card"><div class="stat-num" style="color:#ff4757">'+(reps?.length||0)+'</div><div class="stat-label">Segnalazioni</div></div></div>';
  html+='<div class="tabs"><div class="tab active" onclick="adminTab(\'reports\',this)">🚩 Segnalazioni</div><div class="tab" onclick="adminTab(\'users\',this)">👥 Utenti</div><div class="tab" onclick="adminTab(\'events\',this)">📅 Eventi</div></div><div id="adminTabContent">';
  if(!reps||!reps.length)html+='<div style="text-align:center;color:#aaa;padding:30px">✅ Nessuna segnalazione pendente</div>';
  else reps.forEach(r=>{html+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-weight:700">'+r.reason+'</div><div style="font-size:12px;color:#aaa">'+new Date(r.created_at).toLocaleDateString('it-IT')+'</div></div><span class="badge red">pending</span></div>'+(r.description?'<div style="font-size:13px;color:#666;margin-bottom:8px">'+r.description+'</div>':'')+'<div style="display:flex;gap:8px"><div class="btn sm danger" onclick="adminResolve('+r.id+',\'resolved\')">✅ Risolvi</div><div class="btn sm secondary" onclick="adminResolve('+r.id+',\'dismissed\')">Ignora</div></div></div>';});
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}

async function adminTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  const c=document.getElementById('adminTabContent');c.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  if(tab==='reports'){
    const {data}=await supabase.from('reports').select('*').order('created_at',{ascending:false}).limit(20);
    let h='';(data||[]).forEach(r=>{h+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-weight:700">'+r.reason+'</div><div style="font-size:12px;color:#aaa">'+new Date(r.created_at).toLocaleDateString('it-IT')+'</div></div><span class="badge '+(r.status==='pending'?'red':'green')+'">'+r.status+'</span></div>'+(r.status==='pending'?'<div style="display:flex;gap:8px"><div class="btn sm danger" onclick="adminResolve('+r.id+',\'resolved\')">✅ Risolvi</div><div class="btn sm secondary" onclick="adminResolve('+r.id+',\'dismissed\')">Ignora</div></div>':'')+'</div>';});
    c.innerHTML=h||'<div style="text-align:center;color:#aaa;padding:30px">Nessuna segnalazione</div>';
  } else if(tab==='users'){
    const {data}=await supabase.from('profiles').select('*').order('created_at',{ascending:false}).limit(20);
    let h='';(data||[]).forEach(u=>{h+='<div class="card"><div style="display:flex;align-items:center;gap:12px"><div class="avatar">'+(u.emoji||'👤')+'</div><div style="flex:1"><div style="font-weight:700">'+(u.name||'Utente')+(u.verified?' ✅':'')+'</div><div style="font-size:12px;color:#888">📍 '+(u.city||'')+'</div></div><div class="btn sm danger" onclick="toast(\'Presto disponibile\')">🚫</div></div></div>';});
    c.innerHTML=h||'<div style="text-align:center;color:#aaa;padding:30px">Nessun utente</div>';
  } else if(tab==='events'){
    const {data}=await supabase.from('events').select('*').order('created_at',{ascending:false}).limit(20);
    let h='';(data||[]).forEach(e=>{h+='<div class="card"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:28px">'+(e.emoji||'🎉')+'</span><div style="flex:1"><div style="font-weight:700">'+e.title+'</div><div style="font-size:12px;color:#888">'+(e.location||'')+' • <span class="badge '+(e.status==='active'?'green':'red')+'">'+e.status+'</span></div></div><div class="btn sm danger" onclick="adminRemoveEvent('+e.id+')">🗑️</div></div></div>';});
    c.innerHTML=h||'<div style="text-align:center;color:#aaa;padding:30px">Nessun evento</div>';
  }
}

async function adminResolve(id,status){await supabase.from('reports').update({status}).eq('id',id);toast(status==='resolved'?'✅ Risolto':'🗑️ Ignorato');drawAdmin();}
async function adminRemoveEvent(id){await supabase.from('events').update({status:'removed'}).eq('id',id);toast('🗑️ Evento rimosso');await loadEvents();drawAdmin();}
